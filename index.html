<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>3D POLYGON FIGHTER</title>
<style>
  :root{ color-scheme: dark; }
  *{
    box-sizing:border-box; -webkit-tap-highlight-color:transparent;
    touch-action:none; user-select:none; -webkit-user-select:none;
    -webkit-touch-callout:none; -webkit-user-drag:none;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#0b0d14; color:#eef2ff;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    overscroll-behavior:none; touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #app{ position:fixed; inset:0; }
  #scene{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- HUD ---------- */
  #hud{
    position:absolute; top:0; left:0; right:0; pointer-events:none;
    padding:env(safe-area-inset-top,0) calc(10px + env(safe-area-inset-right,0)) 0 calc(10px + env(safe-area-inset-left,0));
  }
  .hpRow{ display:flex; align-items:center; gap:8px; margin-top:10px; }
  .hpRow.right{ flex-direction:row-reverse; }
  .hpWrap{ flex:1; height:16px; background:#000a; border:2px solid #444d66; border-radius:8px; overflow:hidden; position:relative; }
  .hpBar{ height:100%; width:100%; background:linear-gradient(90deg,#ffd23f,#ff5e3a); transition:width .25s ease-out; }
  .hpRow.right .hpBar{ margin-left:auto; }
  .name{ width:74px; font-size:11px; font-weight:700; letter-spacing:.05em; text-shadow:0 1px 3px #000; flex-shrink:0; }
  .hpRow.right .name{ text-align:right; }
  .pips{ display:flex; gap:4px; flex-shrink:0; }
  .hpRow.right .pips{ flex-direction:row-reverse; }
  .pip{ width:12px; height:12px; border-radius:50%; border:2px solid #ffd23f; background:transparent; }
  .pip.on{ background:#ffd23f; }

  #centerText{
    position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
    text-align:center; pointer-events:none; z-index:5;
  }
  #centerText .big{ font-size:clamp(28px,7vw,56px); font-weight:800; letter-spacing:.08em; text-shadow:0 3px 10px #000, 0 0 20px #ff5e3a99; opacity:0; }
  #centerText .small{ font-size:clamp(13px,3vw,18px); margin-top:6px; opacity:.85; }
  #centerText.show .big{ animation: pop .5s ease-out forwards; }
  @keyframes pop{ 0%{ transform:scale(.4); opacity:0; } 60%{ transform:scale(1.12); opacity:1; } 100%{ transform:scale(1); opacity:1; } }

  #overlay{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:#000c; z-index:20; flex-direction:column; gap:14px; text-align:center; padding:20px;
  }
  #overlay.show{ display:flex; }
  #overlay h1{ font-size:clamp(22px,5vw,34px); margin:0; letter-spacing:.05em; }
  #overlay p{ margin:0; opacity:.75; font-size:14px; }
  #overlay button{
    pointer-events:auto; font-size:16px; font-weight:700; padding:12px 28px; border-radius:30px;
    border:2px solid #ffd23f; background:#ffd23f22; color:#ffd23f; letter-spacing:.05em;
  }

  #stageSelect{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:#000d; z-index:30; flex-direction:column; gap:16px; text-align:center; padding:20px;
  }
  #stageSelect.hide{ display:none; }
  #stageSelect h1{ font-size:clamp(18px,4.5vw,28px); margin:0; letter-spacing:.05em; }
  #stageGrid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    width:100%; max-width:620px; pointer-events:auto;
  }
  .stageBtn{
    padding:14px 6px; border-radius:14px; font-size:13px; font-weight:700; line-height:1.4;
    border:2px solid #ffffff44; color:#fff; letter-spacing:.02em;
  }
  .stageBtn:active{ transform:scale(0.96); }
  .stageBtn[data-stage="colosseum"]{ background:linear-gradient(160deg,#cbb07a55,#8fc7e855); border-color:#e0c98a; }
  .stageBtn[data-stage="beach"]{ background:linear-gradient(160deg,#ff9a5a55,#ffe28a55); border-color:#ffb070; }
  .stageBtn[data-stage="dome"]{ background:linear-gradient(160deg,#2a5fa855,#14141c88); border-color:#7ab0ff; }
  .stageBtn[data-stage="grass"]{ background:linear-gradient(160deg,#3f7d3a55,#8fd0f055); border-color:#8ee07a; }
  .stageBtn[data-stage="volcano"]{ background:linear-gradient(160deg,#ff5a1a55,#3a181088); border-color:#ff8a50; }
  .stageBtn[data-stage="dojo"]{ background:linear-gradient(160deg,#a9743f55,#2a201888); border-color:#d8b06a; }

  #modeSelect, #onlinePanel, #waitHostPanel, #difficultySelect{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:#000d; z-index:31; flex-direction:column; gap:14px; text-align:center; padding:20px;
  }
  #modeSelect.hide, #onlinePanel.hide, #waitHostPanel.hide, #difficultySelect.hide{ display:none; }
  #modeSelect h1, #onlinePanel h1, #waitHostPanel h1, #difficultySelect h1{ font-size:clamp(18px,4.5vw,28px); margin:0 0 6px; letter-spacing:.05em; }
  .menuBtn{
    pointer-events:auto; font-size:15px; font-weight:700; padding:14px 30px; border-radius:16px;
    border:2px solid #ffd23f; background:#ffd23f18; color:#ffd23f; letter-spacing:.05em;
  }
  .menuBtn:active{ background:#ffd23f33; }
  .menuBtn.ghost{ border-color:#ffffff55; color:#ccc; background:transparent; font-size:13px; padding:10px 22px; }
  #onlinePanel input{
    font-size:16px; padding:10px 14px; border-radius:10px; border:2px solid #ffffff44;
    background:#ffffff10; color:#fff; text-align:center; width:220px; letter-spacing:.05em;
    pointer-events:auto;
  }
  #hostIdBox{ display:flex; flex-direction:column; gap:8px; align-items:center; }
  #hostIdBox.hide{ display:none; }
  #hostIdText{
    font-size:22px; font-weight:800; letter-spacing:.12em; padding:10px 18px;
    border:2px dashed #ffd23f; border-radius:10px; color:#ffd23f; background:#00000040;
  }
  .netDivider{ opacity:.55; font-size:12px; margin:4px 0; }
  .netStatus{ font-size:13px; opacity:.85; min-height:18px; }

  #hint{
    position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    font-size:10px; opacity:.5; display:none; pointer-events:none;
  }
  @media (orientation:portrait){ #hint{ display:block; } }

  #errBanner{
    display:none; position:fixed; left:0; right:0; bottom:0; max-height:35%;
    background:#a00000ee; color:#fff; font-size:11px; line-height:1.4;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom,0));
    z-index:9999; word-break:break-all; overflow-y:auto; pointer-events:none;
  }
  #errBanner.show{ display:block; }

  /* ---------- Controls ---------- */
  #controls{
    position:absolute; left:0; right:0; bottom:0;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:0 calc(14px + env(safe-area-inset-right,0)) env(safe-area-inset-bottom,14px) calc(14px + env(safe-area-inset-left,0));
    pointer-events:none;
  }
  #dpad, #actions{ position:relative; width:150px; height:150px; pointer-events:auto; }
  .ctlBtn{
    position:absolute; display:flex; align-items:center; justify-content:center;
    width:50px; height:50px; border-radius:12px;
    background:rgba(8,10,16,0.6); border:1.5px solid #ffffff66; color:#fff;
    font-size:18px; font-weight:700; backdrop-filter:blur(3px) brightness(0.85);
    text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6);
    box-shadow:0 1px 6px rgba(0,0,0,0.4);
  }
  .ctlBtn:active{ background:rgba(30,32,40,0.75); }
  #dpad .ctlBtn{ border-radius:10px; }
  #dUp{ top:0; left:50px; } #dDown{ top:100px; left:50px; }
  #dLeft{ top:50px; left:0; } #dRight{ top:50px; left:100px; }

  #actions .ctlBtn{ width:56px; height:56px; border-radius:50%; font-size:18px; }
  #btnC{ top:0; left:47px; border-color:#ff8a4d; color:#ffcaa8; }
  #btnB{ top:47px; left:94px; border-color:#8a5eff; color:#d6c6ff; }
  #btnA{ top:94px; left:47px; border-color:#4da6ff; color:#a9d4ff; }
  #btnD{ top:47px; left:0px; border-color:#ff5e5e; color:#ffb3b3; }
  #btnA.active{ background:rgba(77,166,255,0.45); }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div id="hud">
    <div class="hpRow">
      <div class="name">PLAYER</div>
      <div class="hpWrap"><div class="hpBar" id="hpP"></div></div>
      <div class="pips" id="pipsP"><span class="pip"></span><span class="pip"></span></div>
    </div>
    <div class="hpRow right">
      <div class="name">CPU</div>
      <div class="hpWrap"><div class="hpBar" id="hpC"></div></div>
      <div class="pips" id="pipsC"><span class="pip"></span><span class="pip"></span></div>
    </div>
  </div>

  <div id="centerText"><div class="big"></div><div class="small"></div></div>
  <div id="hint">横向き表示推奨 / Rotate for best experience</div>
  <div id="errBanner"></div>

  <div id="overlay">
    <h1 id="overlayTitle">3D POLYGON FIGHTER</h1>
    <p id="overlaySub">タップして試合開始</p>
    <button id="overlayBtn">START</button>
  </div>

  <div id="modeSelect">
    <h1>対戦モードを選択</h1>
    <button class="menuBtn" id="modeCpuBtn">CPUと対戦</button>
    <button class="menuBtn" id="modeOnlineBtn">オンライン対戦 (P2P)</button>
  </div>

  <div id="difficultySelect" class="hide">
    <h1>CPUの強さを選択</h1>
    <button class="menuBtn" id="diffNoviceBtn">練習生</button>
    <button class="menuBtn" id="diffMasterBtn">師範</button>
    <button class="menuBtn" id="diffExpertBtn">達人</button>
    <button class="menuBtn ghost" id="difficultyBackBtn">戻る</button>
  </div>

  <div id="onlinePanel" class="hide">
    <h1>オンライン対戦</h1>
    <button class="menuBtn" id="hostCreateBtn">部屋を作る（ホスト）</button>
    <div id="hostIdBox" class="hide">
      <p style="margin:0;opacity:.8;font-size:12px;">この番号を相手に伝えてください（3分以内に接続がなければ自動的に閉じます）</p>
      <div id="hostIdText">-----</div>
      <button class="menuBtn ghost" id="copyIdBtn">コピー</button>
      <p class="netStatus" id="hostStatus">相手の接続を待っています…</p>
      <button class="menuBtn ghost" id="disbandBtn">部屋を解散する</button>
    </div>
    <div class="netDivider">または</div>
    <input id="joinIdInput" placeholder="相手の6桁IDを入力" autocomplete="off" maxlength="6" inputmode="numeric" pattern="[0-9]*" />
    <button class="menuBtn" id="joinBtn">このIDに接続する</button>
    <p class="netStatus" id="joinStatus"></p>
    <button class="menuBtn ghost" id="onlineBackBtn">戻る</button>
  </div>

  <div id="waitHostPanel" class="hide">
    <h1>接続しました</h1>
    <p class="netStatus">ホストがステージを選択しています…</p>
  </div>

  <div id="stageSelect" class="hide">
    <h1>ステージを選択</h1>
    <div id="stageGrid">
      <button class="stageBtn" data-stage="colosseum">①<br>コロシアム<br><span style="font-weight:400;opacity:.75">床:砂</span></button>
      <button class="stageBtn" data-stage="beach">②<br>夕日の砂浜<br><span style="font-weight:400;opacity:.75">床:砂浜</span></button>
      <button class="stageBtn" data-stage="dome">③<br>東京ドーム<br><span style="font-weight:400;opacity:.75">床:リング</span></button>
      <button class="stageBtn" data-stage="grass">④<br>草原<br><span style="font-weight:400;opacity:.75">床:草原</span></button>
      <button class="stageBtn" data-stage="volcano">⑤<br>噴火した山<br><span style="font-weight:400;opacity:.75">床:石畳</span></button>
      <button class="stageBtn" data-stage="dojo">⑥<br>道場<br><span style="font-weight:400;opacity:.75">床:木製</span></button>
    </div>
  </div>

  <div id="controls">
    <div id="dpad">
      <div class="ctlBtn" id="dUp">▲</div>
      <div class="ctlBtn" id="dLeft">◀</div>
      <div class="ctlBtn" id="dRight">▶</div>
      <div class="ctlBtn" id="dDown">▼</div>
    </div>
    <div id="actions">
      <div class="ctlBtn" id="btnC">K</div>
      <div class="ctlBtn" id="btnB">N</div>
      <div class="ctlBtn" id="btnA">G</div>
      <div class="ctlBtn" id="btnD">P</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

/* Surface otherwise-silent runtime errors on-screen — there's no console
   access on a phone, so this is how a broken background/audio/etc. gets
   diagnosed instead of just failing invisibly. */
function showErrBanner(msg){
  const el = document.getElementById('errBanner');
  el.textContent = 'ERR: ' + String(msg).slice(0, 300);
  el.classList.add('show');
}
addEventListener('error', (e) => showErrBanner(e.message));
addEventListener('unhandledrejection', (e) => showErrBanner(e.reason && e.reason.message ? e.reason.message : e.reason));

/* =========================================================
   Renderer / Scene / Camera
   ========================================================= */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x11141d);
scene.fog = new THREE.Fog(0x11141d, 10, 26);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);

function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

/* =========================================================
   Lock down mobile browser gestures that fight the game UI:
   pinch-zoom, double-tap-zoom, long-press callouts, drag, etc.
   ========================================================= */
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('dragstart', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive:false });
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive:false });

const hemiLight = new THREE.HemisphereLight(0xaabbff, 0x1a1420, 0.9);
scene.add(hemiLight);
const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
keyLight.position.set(3, 7, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024,1024);
scene.add(keyLight);

/* =========================================================
   Stage backgrounds — built on demand once the player picks one
   ========================================================= */
function makeCanvasTexture(size, draw, repeatX, repeatY){
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = size;
  draw(cnv.getContext('2d'), size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

function speckleTexture(base, specks){
  return makeCanvasTexture(128, (ctx, s) => {
    ctx.fillStyle = base; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 420; i++){
      ctx.fillStyle = specks[Math.floor(Math.random()*specks.length)];
      const x = Math.random()*s, y = Math.random()*s, r = Math.random()*1.6+0.3;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    }
  }, 6, 6);
}

function woodTexture(){
  return makeCanvasTexture(128, (ctx, s) => {
    ctx.fillStyle = '#a9743f'; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 8; i++){
      ctx.fillStyle = i % 2 ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, i*16, s, 2);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    for (let i = 0; i < 40; i++){
      let x = Math.random()*s, y = Math.random()*s;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+Math.random()*20-10, y); ctx.stroke();
    }
  }, 6, 6);
}

function stoneTexture(){
  return makeCanvasTexture(128, (ctx, s) => {
    ctx.fillStyle = '#4a4640'; ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = 'rgba(15,10,8,0.75)'; ctx.lineWidth = 2;
    for (let i = 0; i < 10; i++){
      let x = Math.random()*s, y = Math.random()*s;
      ctx.beginPath(); ctx.moveTo(x, y);
      for (let j = 0; j < 5; j++){ x += Math.random()*24-12; y += Math.random()*24-12; ctx.lineTo(x, y); }
      ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    for (let i = 0; i <= 4; i++){
      ctx.beginPath(); ctx.moveTo(i*s/4, 0); ctx.lineTo(i*s/4, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*s/4); ctx.lineTo(s, i*s/4); ctx.stroke();
    }
  }, 5, 5);
}

const stageGroup = new THREE.Group();
scene.add(stageGroup);

function clearStage(){
  for (const obj of [...stageGroup.children]){
    stageGroup.remove(obj);
    obj.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
    });
  }
}

function lightAtmosphere(hemiSky, hemiGround, hemiI, keyColor, keyI){
  hemiLight.color.set(hemiSky); hemiLight.groundColor.set(hemiGround); hemiLight.intensity = hemiI;
  keyLight.color.set(keyColor); keyLight.intensity = keyI;
}

const textureLoader = new THREE.TextureLoader();
function setStageBackground(path, fogColor, fogNear, fogFar){
  scene.background = new THREE.Color(fogColor); // shown instantly while the photo loads in
  scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);
  const applyTexture = (tex) => {
    // NPOT-safe settings: some mobile GPUs/WebGL1 contexts silently fail to
    // mipmap a non-power-of-two image, leaving scene.background on the
    // fallback color instead of throwing a visible error.
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.generateMipmaps = false;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.wrapS = THREE.ClampToEdgeWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.needsUpdate = true;
    scene.background = tex;
  };
  textureLoader.load(path, applyTexture, undefined, () => {
    // transient mobile-network hiccup — retry once before giving up
    setTimeout(() => {
      textureLoader.load(path, applyTexture, undefined, (err) => {
        console.error('stage background failed to load:', path, err);
      });
    }, 1200);
  });
}

const STAGE_DEFS = {
  colosseum: { name:'① コロシアム', build(g){
    setStageBackground('assets/stages/colosseum.jpg?v=2', 0x8a7550, 16, 38);
    lightAtmosphere(0xffe9c2, 0xcbb07a, 1.0, 0xfff3d0, 1.1);

    const floor = new THREE.Mesh(new THREE.CircleGeometry(9, 48),
      new THREE.MeshStandardMaterial({ map: speckleTexture('#cbb07a', ['rgba(0,0,0,0.08)','rgba(255,255,255,0.1)']), roughness:0.95 }));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; g.add(floor);

    const ring = new THREE.Mesh(new THREE.RingGeometry(8.5, 9, 64), new THREE.MeshStandardMaterial({ color:0xff5e3a, roughness:0.6, side:THREE.DoubleSide }));
    ring.rotation.x = -Math.PI/2; ring.position.y = 0.01; g.add(ring);
  }},

  beach: { name:'② 夕日の砂浜', build(g){
    setStageBackground('assets/stages/beach.jpg?v=2', 0xd97a4a, 12, 34);
    lightAtmosphere(0xffb37a, 0xd7a45a, 1.0, 0xffb070, 1.2);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ map: speckleTexture('#e7c896', ['rgba(0,0,0,0.05)','rgba(255,255,255,0.12)']), roughness:0.95 }));
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; g.add(floor);

    function palm(x, z){
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, 3, 8), new THREE.MeshStandardMaterial({ color:0x6b4a2f, roughness:0.9 }));
      trunk.position.set(x, 1.5, z); g.add(trunk);
      for (let i = 0; i < 5; i++){
        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.6, 6), new THREE.MeshStandardMaterial({ color:0x2e7d32, roughness:0.8 }));
        leaf.position.set(x, 3.1, z);
        leaf.rotation.z = Math.PI/2.6;
        leaf.rotation.y = (i/5)*Math.PI*2;
        g.add(leaf);
      }
    }
    palm(-7.5, -4); palm(7.5, -5.5);
  }},

  dome: { name:'③ 東京ドーム', build(g){
    setStageBackground('assets/stages/dome.jpg?v=2', 0x18181f, 16, 34);
    lightAtmosphere(0xbcd0ff, 0x202030, 0.8, 0xffffff, 1.3);

    const floor = new THREE.Mesh(new THREE.CircleGeometry(20, 32), new THREE.MeshStandardMaterial({ color:0x0e0e14, roughness:1 }));
    floor.rotation.x = -Math.PI/2; floor.position.y = -0.2; floor.receiveShadow = true; g.add(floor);

    const mat = new THREE.Mesh(new THREE.BoxGeometry(9, 0.4, 9), new THREE.MeshStandardMaterial({ color:0x2a5fa8, roughness:0.85 }));

/* =========================================================
   Fighter model — 3-piece torso (hips / waist / chest) +
   articulated arms (shoulder→elbow) and legs (hip→knee)
   ========================================================= */
function buildFighterMesh(color){
  const root = new THREE.Group();
  const base = new THREE.Color(color);
  const beltMat = new THREE.MeshStandardMaterial({ color: base, roughness:0.55 }); // obi — keeps the player/CPU color coding
  const giMat = new THREE.MeshStandardMaterial({ color:0xf0ebe0, roughness:0.85 }); // karate gi fabric
  const skinMat = new THREE.MeshStandardMaterial({ color:0xe8b48c, roughness:0.7 });
  const hitMeshes = [];

  // ---- 腰下 (hips / pelvis) ----
  const hips = new THREE.Group();
  hips.position.set(0, 0.92, 0);
  root.add(hips);
  const hipsMesh = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.24, 0.30), giMat);
  hipsMesh.castShadow = true;
  hips.add(hipsMesh);
  hitMeshes.push(hipsMesh);

  // ---- ウエスト (waist) — doubles as the obi/belt ----
  const waist = new THREE.Group();
  waist.position.set(0, 1.12, 0);
  root.add(waist);
  const waistMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.19, 0.09, 4, 8), beltMat);
  waistMesh.castShadow = true;
  waist.add(waistMesh);
  hitMeshes.push(waistMesh);

  // ---- バスト (chest) — also the upper-body lean pivot ----
  const chest = new THREE.Group();
  chest.position.set(0, 1.28, 0);
  root.add(chest);
  const chestMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.27, 0.26, 4, 8), giMat);
  chestMesh.position.y = 0.23;
  chestMesh.castShadow = true;
  chest.add(chestMesh);
  hitMeshes.push(chestMesh);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.23, 16, 16), skinMat);
  head.position.set(0, 0.62, 0);
  head.castShadow = true;
  chest.add(head);

  // ---- Arms: 肩(shoulder) → 肘(elbow) ----
  function buildArm(side){
    const shoulder = new THREE.Group();
    shoulder.position.set(side * 0.33, 0.32, 0);
    chest.add(shoulder);

    const upperLen = 0.24, upperR = 0.078;
    const upperArm = new THREE.Mesh(new THREE.CapsuleGeometry(upperR, upperLen, 4, 8), giMat);
    upperArm.position.y = -(upperLen/2 + upperR);
    upperArm.castShadow = true;
    shoulder.add(upperArm);
    hitMeshes.push(upperArm);

    const elbow = new THREE.Group();
    elbow.position.y = -(upperLen + upperR*2);
    shoulder.add(elbow);

    const foreLen = 0.24, foreR = 0.066;
    const forearm = new THREE.Mesh(new THREE.CapsuleGeometry(foreR, foreLen, 4, 8), giMat);
    forearm.position.y = -(foreLen/2 + foreR);
    forearm.castShadow = true;
    elbow.add(forearm);

    const fist = new THREE.Mesh(new THREE.SphereGeometry(0.088, 12, 12), skinMat);
    fist.position.y = -(foreLen + foreR*2);
    fist.castShadow = true;
    elbow.add(fist);

    return { shoulder, elbow };
  }
  const armL = buildArm(-1);
  const armR = buildArm(1);

  // ---- Legs: 股関節(hip) → 膝(knee) ----
  function buildLeg(side, zOffset){
    const hip = new THREE.Group();
    hip.position.set(side * 0.22, -0.10, zOffset);
    hips.add(hip);

    const thighLen = 0.30, thighR = 0.105;
    const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(thighR, thighLen, 4, 8), giMat);
    thigh.position.y = -(thighLen/2 + thighR);
    thigh.castShadow = true;
    hip.add(thigh);
    hitMeshes.push(thigh);

    const knee = new THREE.Group();
    knee.position.y = -(thighLen + thighR*2);
    hip.add(knee);

    const shinLen = 0.30, shinR = 0.088;
    const shin = new THREE.Mesh(new THREE.CapsuleGeometry(shinR, shinLen, 4, 8), giMat);
    shin.position.y = -(shinLen/2 + shinR);
    shin.castShadow = true;
    knee.add(shin);

    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.08, 0.24), skinMat);
    foot.position.set(0, -(shinLen + shinR*2), 0.05);
    foot.castShadow = true;
    knee.add(foot);

    return { hip, knee };
  }
  // legR leads the stance (offset toward +Z, toward the opponent — "front"), legL trails ("back")
  const legL = buildLeg(-1, -0.17);
  const legR = buildLeg(1, 0.17);

  root.userData.limbs = { hips, waist, chest, head, armL, armR, legL, legR, hitMeshes };
  return root;
}

/* Fighting-stance base pose (constantly blended toward during idle/guard/movement).
   faceOpponent()'s lookAt points local +Z at the opponent, so +X rotation on a limb
   pivot swings it toward local -Z (away/back); -X swings it toward +Z (toward the
   opponent/front). legR sits structurally forward (built with a +Z offset), legL back.
   chestLeanX is the OPPOSITE sign convention: the chest/head sit above their pivot
   (not hanging below it like limbs), so +X leans the chest/head toward +Z (forward).
   For the guard, shoulderX is +(elbow tucked back/away from the opponent) and elbowX
   is - enough to fold the forearm back past it, so the fist ends up forward again. */
const STANCE = {
  chestLeanX: 0.24,
  frontHipX: -0.32, frontKneeX: 0.8,
  backHipX: -0.14, backKneeX: 1.05,
  shoulderX: -Math.PI/2, shoulderZ: 0.24, elbowX: -(80 * Math.PI/180),
};

const ARENA_X = 4.3, ARENA_Z = 1.6, MIN_GAP = 0.95;

class Fighter{
  constructor(name, color, x, isCPU){
    this.name = name;
    this.isCPU = isCPU;
    this.mesh = buildFighterMesh(color);
    this.mesh.position.set(x, 0, 0);
    scene.add(this.mesh);

    this.hp = 100; this.maxHp = 100; this.wins = 0;
    this.state = 'idle'; // idle | attack | throw | thrown | hitstun | down | knockdown
    this.attackType = null;
    this.attackStart = 0;
    this.attackResolved = true;
    this.isDashAttack = false;
    this.dashBuffUntil = 0;
    this.guard = false;
    this.guardReleaseAt = Infinity;
    this.lastAttack = { type:null, stage:0, time:-9999 };
    this.comboStage = 0;       // 1/2/3 = which hit of the current punch/kick string
    this.comboExpireAt = 0;    // pressing the same button again before this time continues the combo
    this.queuedAction = null;  // buffered next-hit input pressed while mid-attack
    this.comboDecided = true;  // CPU-only: has this attack's combo-continue roll already happened
    this.knockdownStart = 0;
    this.posTween = null;      // {fromX,fromZ,toX,toZ,start,duration}
    this.throwInfo = null;     // active throw animation data
    this.hitstunUntil = 0;
    this.nextDecision = 0;     // CPU think timer
    this.flashUntil = 0;
    this.baseColor = color;
    this.downType = null;
    this.bobPhase = Math.random() * Math.PI * 2;
  }
}

const player = new Fighter('PLAYER', 0x3fa9ff, -1.6, false);
const cpu    = new Fighter('CPU',    0xff4d4d,  1.6, true);
function other(f){ return f === player ? cpu : player; }

/* =========================================================
   Camera framing — keeps both fighters in view, look-at midpoint
   ========================================================= */
function updateCamera(){
  const p1 = player.mesh.position, p2 = cpu.mesh.position;
  const midX = (p1.x + p2.x) / 2;
  const midZ = (p1.z + p2.z) / 2;

  const halfSpanNeeded = Math.abs(p1.x - p2.x) / 2 + 1.3;
  const hFovHalf = Math.atan(Math.tan(THREE.MathUtils.degToRad(camera.fov)/2) * camera.aspect);
  const neededDist = halfSpanNeeded / Math.tan(hFovHalf);
  const camDist = THREE.MathUtils.clamp(neededDist + 1.8, 4.2, 10);
  const camHeight = 1.55 + camDist * 0.1;

  let shakeX = 0, shakeY = 0;
  const now = performance.now();
  if (now < shakeUntil){
    shakeX = (Math.random()-0.5) * shakeMag;
    shakeY = (Math.random()-0.5) * shakeMag;
  }

  camera.position.set(midX + shakeX, camHeight + shakeY, midZ + camDist);
  camera.lookAt(midX, 1.15, midZ);
}
let shakeUntil = 0, shakeMag = 0;
function shake(mag, ms){
  shakeUntil = performance.now() + ms; shakeMag = mag;
  if (Net.isHost) netSend({ t:'ev', name:'shake', mag, ms });
}

function faceOpponent(f){
  if (f.state === 'thrown' || f.state === 'down' || f.state === 'thrownDown' || f.state === 'knockdown') return;
  const o = other(f);
  // keep target at the fighter's own height so this is a pure yaw (turn to face),
  // never a pitch — otherwise the whole body tips forward/back like a falling pole.
  const target = new THREE.Vector3(o.mesh.position.x, f.mesh.position.y, o.mesh.position.z);
  f.mesh.lookAt(target);
}

/* =========================================================
   Movement helpers
   ========================================================= */
function tweenPos(f, toX, toZ, duration){
  toX = THREE.MathUtils.clamp(toX, -ARENA_X, ARENA_X);
  toZ = THREE.MathUtils.clamp(toZ, -ARENA_Z, ARENA_Z);
  f.posTween = { fromX:f.mesh.position.x, fromZ:f.mesh.position.z, toX, toZ, start:performance.now(), duration };
}

function dashIn(f){
  if (f.state !== 'idle') return;
  const o = other(f);
  const dir = f.mesh.position.x <= o.mesh.position.x ? 1 : -1;
  let toX = f.mesh.position.x + dir * 1.25;
  toX = dir > 0 ? Math.min(toX, o.mesh.position.x - MIN_GAP) : Math.max(toX, o.mesh.position.x + MIN_GAP);
  tweenPos(f, toX, f.mesh.position.z, 130);
  f.dashBuffUntil = performance.now() + 500;
}

function backstep(f){
  if (f.state !== 'idle') return;
  const o = other(f);
  const dir = f.mesh.position.x <= o.mesh.position.x ? -1 : 1;
  const toX = f.mesh.position.x + dir * 1.25;
  tweenPos(f, toX, f.mesh.position.z, 130);
}

function axisShift(f, sign){
  if (f.state !== 'idle') return;
  const toZ = f.mesh.position.z + sign * 1.3;
  tweenPos(f, f.mesh.position.x, toZ, 150);
}

function clampSeparation(mover){
  const o = other(mover);
  if (Math.abs(mover.mesh.position.x - o.mesh.position.x) < MIN_GAP){
    if (mover.mesh.position.x < o.mesh.position.x) mover.mesh.position.x = o.mesh.position.x - MIN_GAP;
    else mover.mesh.position.x = o.mesh.position.x + MIN_GAP;
  }
}

/* =========================================================
   SFX — synthesized via Web Audio API, no audio assets needed
   ========================================================= */
let actx = null;
function ensureAudio(){
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function noiseBuffer(ctx, duration){
  const rate = ctx.sampleRate;
  const buffer = ctx.createBuffer(1, Math.max(1, Math.round(rate*duration)), rate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random()*2 - 1;
  return buffer;
}

function playNoise(ctx, { duration=0.15, filterFreq=1200, filterType='bandpass', gain=0.5 }){
  const src = ctx.createBufferSource();
  src.buffer = noiseBuffer(ctx, duration);
  const filter = ctx.createBiquadFilter();
  filter.type = filterType; filter.frequency.value = filterFreq;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  src.connect(filter); filter.connect(g); g.connect(ctx.destination);
  src.start();
  src.stop(ctx.currentTime + duration + 0.02);
}

function playTone(ctx, { freq=440, type='sine', duration=0.15, gain=0.3, freqEnd=null, delay=0 }){
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  osc.type = type; osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + duration);
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + duration + 0.02);
}

const SFX = {
  punch(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.04, filterFreq:2800, filterType:'highpass', gain:0.2 }); // brief crack
    playNoise(ctx, { duration:0.16, filterFreq:450, filterType:'lowpass', gain:0.55 }); // meaty body
    playTone(ctx, { freq:110, type:'sine', duration:0.2, gain:0.7, freqEnd:35 }); // low thump
  },
  kick(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.05, filterFreq:2200, filterType:'highpass', gain:0.2 });
    playNoise(ctx, { duration:0.22, filterFreq:320, filterType:'lowpass', gain:0.6 });
    playTone(ctx, { freq:80, type:'sine', duration:0.26, gain:0.75, freqEnd:28 });
  },
  guard(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.05, filterFreq:2600, filterType:'highpass', gain:0.35 });
    playTone(ctx, { freq:520, type:'square', duration:0.05, gain:0.2 });
  },
  miss(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.18, filterFreq:2000, filterType:'bandpass', gain:0.16 });
  },
  throwHit(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.22, filterFreq:500, filterType:'lowpass', gain:0.6 });
    playTone(ctx, { freq:90, type:'sine', duration:0.28, gain:0.6, freqEnd:35 });
  },
  heavyHit(){ const ctx = ensureAudio(); // combo finisher impact — uppercut knockdown / sobat knockback
    playNoise(ctx, { duration:0.06, filterFreq:2500, filterType:'highpass', gain:0.25 });
    playNoise(ctx, { duration:0.28, filterFreq:280, filterType:'lowpass', gain:0.7 });
    playTone(ctx, { freq:70, type:'sine', duration:0.34, gain:0.8, freqEnd:24 });
  },
  bell(){ const ctx = ensureAudio();
    playTone(ctx, { freq:880, type:'sine', duration:0.5, gain:0.35 });
    playTone(ctx, { freq:1320, type:'sine', duration:0.4, gain:0.2, delay:0.02 });
  },
  ko(){ const ctx = ensureAudio();
    [660, 550, 440, 330].forEach((f, i) => playTone(ctx, { freq:f, type:'sawtooth', duration:0.22, gain:0.3, delay:i*0.09 }));
  },
  win(){ const ctx = ensureAudio();
    [440, 554, 659, 880].forEach((f, i) => playTone(ctx, { freq:f, type:'triangle', duration:0.28, gain:0.3, delay:i*0.12 }));
  },
  tap(){ const ctx = ensureAudio();
    playTone(ctx, { freq:700, type:'square', duration:0.03, gain:0.12 });
  },
};
// broadcast every SFX call (except the local-only button tap) to the guest when hosting online
Object.keys(SFX).forEach(name => {
  if (name === 'tap') return;
  const original = SFX[name];
  SFX[name] = function(...args){
    original.apply(SFX, args);
    if (Net.isHost) netSend({ t:'ev', name:'sfx', sfx:name });
  };
});

/* =========================================================
   Combat: attacks
   ========================================================= */
// Per-combo-stage specs. Stage 1 of each is byte-for-byte the original single punch/kick.
const PUNCH_SPECS = [ null,
  { startup:130, active:90,  recovery:220, dmg:8,  reach:1.55 },                    // 1: jab (unchanged)
  { startup:110, active:80,  recovery:200, dmg:9,  reach:1.55 },                    // 2: cross (one-two)
  { startup:150, active:100, recovery:320, dmg:14, reach:1.5,  knockdown:true },    // 3: uppercut
];
const KICK_SPECS = [ null,
  { startup:190, active:100, recovery:300, dmg:12, reach:1.85 },                    // 1: body roundhouse (unchanged)
  { startup:175, active:100, recovery:290, dmg:13, reach:1.85 },                    // 2: head kick
  { startup:230, active:110, recovery:360, dmg:16, reach:1.9,  knockback:2 },       // 3: rolling sobat
];
function getAttackSpec(type, stage){
  const table = type === 'kick' ? KICK_SPECS : PUNCH_SPECS;
  return table[stage] || table[1];
}

const COMBO_BUFFER_MS = 550; // window after a hit's recovery ends during which the same button continues the string
const KNOCKBACK_STEP = 0.9;

function startAttackStage(f, type, stage, now){
  const spec = getAttackSpec(type, stage);
  f.state = 'attack';
  f.attackType = type;
  f.comboStage = stage;
  f.attackStart = now;
  f.attackResolved = false;
  f.queuedAction = null;
  f.comboDecided = false;
  f.isDashAttack = now < f.dashBuffUntil;
  f.dashBuffUntil = 0;
  f.lastAttack = { type, stage, time:now };
  f.comboExpireAt = now + spec.startup + spec.active + spec.recovery + COMBO_BUFFER_MS;
}

function tryAttack(f, type){
  if (f.guard) return;
  const now = performance.now();
  if (f.state === 'attack'){
    // buffer the next hit of the same string; consumed once the current hit's animation finishes
    if (f.attackType === type && !f.queuedAction && f.comboStage < 3) f.queuedAction = type;
    return;
  }
  if (f.state !== 'idle') return;
  const stage = (f.attackType === type && now < f.comboExpireAt && f.comboStage < 3) ? f.comboStage + 1 : 1;
  startAttackStage(f, type, stage, now);
}

function resolveAttackHit(attacker){
  if (attacker.attackResolved) return;
  attacker.attackResolved = true;
  const defender = other(attacker);
  if (defender.state === 'down') return;

  const spec = getAttackSpec(attacker.attackType, attacker.comboStage);
  const dx = Math.abs(attacker.mesh.position.x - defender.mesh.position.x);
  const dz = Math.abs(attacker.mesh.position.z - defender.mesh.position.z);

  if (dx > spec.reach || dz > 0.75 || defender.state === 'thrown' || defender.state === 'thrownDown' || defender.state === 'knockdown'){
    flashCenterText('MISS', '', 500);
    SFX.miss();
    return; // evaded via axis-shift / backstep / range
  }

  let dmg = spec.dmg * (attacker.isDashAttack ? 1.5 : 1);

  if (defender.guard){
    dmg *= 0.3;
    shake(0.04, 100);
    SFX.guard();
  } else if (spec.knockdown){
    shake(0.14, 220);
    SFX.heavyHit();
    defender.state = 'knockdown';
    defender.knockdownStart = now2();
  } else if (spec.knockback){
    shake(0.14, 220);
    SFX.heavyHit();
    const dir = Math.sign(defender.mesh.position.x - attacker.mesh.position.x) || 1;
    tweenPos(defender, defender.mesh.position.x + dir * spec.knockback * KNOCKBACK_STEP, defender.mesh.position.z, 260);
    defender.state = 'hitstun';
    defender.hitstunUntil = now2() + 420;
  } else {
    defender.state = 'hitstun';
    defender.hitstunUntil = now2() + 260;
    shake(0.09, 150);
    attacker.attackType === 'kick' ? SFX.kick() : SFX.punch();
  }
  flashHit(defender);
  applyDamage(defender, dmg, attacker.attackType);
}

function now2(){ return performance.now(); }

/* =========================================================
   Combat: throws / counters
   ========================================================= */
function tryThrow(f){
  if (f.state !== 'idle') return;
  const o = other(f);
  const now = performance.now();
  const dx = Math.abs(f.mesh.position.x - o.mesh.position.x);
  const dz = Math.abs(f.mesh.position.z - o.mesh.position.z);

  const counterActive = o.state === 'attack' && !o.attackResolved && (now - o.lastAttack.time) <= 500;

  if (counterActive && dx <= 1.9 && dz <= 0.9){
    const stage = o.lastAttack.stage || 1;
    let kind, dmg;
    if (o.lastAttack.type === 'punch'){
      if (stage === 1){
        const throwsUp = f.mesh.position.x < 0; // screen-left => up, screen-right => down
        kind = throwsUp ? 'aikido_up' : 'aikido_down'; dmg = 18;
      } else if (stage === 2){ kind = 'koshi_nage'; dmg = 20; }        // vs the one-two's straight
      else { kind = 'ura_nage'; dmg = 24; }                            // vs the uppercut
    } else {
      if (stage === 1){ kind = 'dragon_screw'; dmg = 20; }
      else if (stage === 2){ kind = 'duck_tackle'; dmg = 20; }         // duck under the head kick, tackle
      else { kind = 'achilles_lock'; dmg = 26; }                       // catch the sobat, reverse achilles lock
    }
    doThrow(f, o, kind, dmg);
    o.state = 'idle'; o.attackResolved = true; // counter negates the attack
    o.comboStage = 0; o.queuedAction = null;
    return;
  }

  if (dx <= 1.05 && dz <= 0.7 && o.state === 'idle'){
    doThrow(f, o, 'seoi_nage', 15);
    return;
  }

  // whiff
  f.state = 'throwWhiff';
  f.attackStart = now;
  flashCenterText('MISS', '', 400);
  SFX.miss();
}

const THROW_DURATIONS = {
  seoi_nage:750, aikido_up:850, aikido_down:850, dragon_screw:850,
  koshi_nage:800, ura_nage:950, duck_tackle:900, achilles_lock:1050,
};

function doThrow(thrower, target, kind, dmg){
  const now = performance.now();
  thrower.state = 'throw'; target.state = 'thrown';
  const data = { kind, start:now, duration: THROW_DURATIONS[kind] || 850,
                 throwerX:thrower.mesh.position.x, throwerZ:thrower.mesh.position.z,
                 targetX0:target.mesh.position.x, targetZ0:target.mesh.position.z,
                 dmg, applied:false };
  thrower.throwInfo = data; target.throwInfo = data;
  shake(kind === 'ura_nage' || kind === 'achilles_lock' ? 0.16 : 0.12, kind === 'achilles_lock' ? 260 : 200);
}

/* =========================================================
   Damage / KO / defeat pose
   ========================================================= */
function applyDamage(f, dmg, cause){
  f.hp = Math.max(0, f.hp - dmg);
  updateHpUI();
  if (f.hp <= 0 && f.state !== 'down'){
    f.state = 'down';
    f.downType = (cause === 'throw') ? 'prone' : 'knees';
    matchState = 'roundEnd';
    SFX.ko();
    setTimeout(() => endRound(f === player ? cpu : player), 900);
  }
}

/* =========================================================
   Pose / animation per-frame
   ========================================================= */
function resetPose(f){
  const L = f.mesh.userData.limbs;
  L.armL.shoulder.rotation.set(0,0,0); L.armL.elbow.rotation.set(0,0,0);
  L.armR.shoulder.rotation.set(0,0,0); L.armR.elbow.rotation.set(0,0,0);
  L.legL.hip.rotation.set(0,0,0); L.legL.knee.rotation.set(0,0,0);
  L.legR.hip.rotation.set(0,0,0); L.legR.knee.rotation.set(0,0,0);
  L.chest.rotation.set(0,0,0);
  L.hips.rotation.set(0,0,0);
  f.mesh.position.y = 0;
  f.mesh.rotation.z = 0;
}

// -PI/2 swings the limb to exactly horizontal (perpendicular to gravity) at full extension.
// Punch goes further still (measured against the opponent's chest height from the crouched
// stance) so the fist lands at chest level instead of reading as a low body-shot.
const PUNCH_POSE = { shoulder:-(104 * Math.PI/180), elbow:0.05 };
const KICK_POSE  = { hip:-Math.PI/2, knee:0.05, hipYaw:0.6, waistYaw:0.35 };

function blendStance(f, rate){
  const L = f.mesh.userData.limbs;
  const lerp = THREE.MathUtils.lerp;
  const guardT = f.guard ? 1 : 0;
  L.chest.rotation.x = lerp(L.chest.rotation.x, STANCE.chestLeanX + guardT*0.05, rate);
  L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, rate);
  L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, rate);
  L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, rate);
  L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, rate);
  L.legL.hip.rotation.y = lerp(L.legL.hip.rotation.y, 0, rate);
  L.hips.rotation.y = lerp(L.hips.rotation.y, 0, rate);
  L.waist.rotation.y = lerp(L.waist.rotation.y, 0, rate);
  L.chest.rotation.y = lerp(L.chest.rotation.y, 0, rate);
  L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX + guardT*0.15, rate);
  L.armL.shoulder.rotation.z = lerp(L.armL.shoulder.rotation.z, STANCE.shoulderZ, rate);
  L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, rate);
  L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX + guardT*0.15, rate);
  L.armR.shoulder.rotation.z = lerp(L.armR.shoulder.rotation.z, -STANCE.shoulderZ, rate);
  L.armR.elbow.rotation.x = lerp(L.armR.elbow.rotation.x, STANCE.elbowX, rate);
  // subtle on-the-balls-of-the-feet bounce so the ready stance never looks frozen
  f.mesh.position.y = Math.sin(performance.now() * 0.0042 + f.bobPhase) * 0.02;
}

function animatePose(f){
  const L = f.mesh.userData.limbs;
  const now = performance.now();
  const lerp = THREE.MathUtils.lerp;

  if (f.state === 'attack'){
    const spec = getAttackSpec(f.attackType, f.comboStage);
    const total = spec.startup + spec.active + spec.recovery;
    const t = THREE.MathUtils.clamp((now - f.attackStart) / total, 0, 1);
    const upT = spec.startup/total, activeEndT = (spec.startup+spec.active)/total;
    let swing;
    if (t < upT) swing = t/upT;
    else if (t < activeEndT) swing = 1;
    else swing = 1 - (t-activeEndT)/(1-activeEndT);

    if (f.attackType === 'kick'){
      if (f.comboStage === 3){
        // rolling sobat — the whole torso spins (hips+waist+chest, arms/head ride along
        // as children of chest) while the rear leg snaps out at the top of the spin
        L.hips.rotation.y = lerp(0, Math.PI*1.1, swing);
        L.waist.rotation.y = lerp(0, Math.PI*1.1, swing);
        L.chest.rotation.y = lerp(0, Math.PI*1.1, swing);
        L.legL.hip.rotation.x = lerp(STANCE.backHipX, KICK_POSE.hip - 0.2, swing);
        L.legL.knee.rotation.x = lerp(STANCE.backKneeX, KICK_POSE.knee, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.25, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX - 0.2, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX - 0.2, 0.2);
      } else if (f.comboStage === 2){
        // head kick — same roundhouse mechanics as stage 1 but chambers higher for the face
        L.legL.hip.rotation.x = lerp(STANCE.backHipX, KICK_POSE.hip - 0.3, swing);
        L.legL.knee.rotation.x = lerp(STANCE.backKneeX, KICK_POSE.knee, swing);
        L.legL.hip.rotation.y = lerp(0, KICK_POSE.hipYaw + 0.25, swing);
        L.hips.rotation.y = lerp(0, KICK_POSE.waistYaw + 0.15, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.22, swing);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX, 0.2);
      } else {
        // rear leg (legL, structurally back) chambers at the hip and snaps the knee straight,
        // with the hip and waist yawing into it so it arcs around like a roundhouse instead
        // of just swinging straight up, letting it reach the opponent's upper body.
        L.legL.hip.rotation.x = lerp(STANCE.backHipX, KICK_POSE.hip, swing);
        L.legL.knee.rotation.x = lerp(STANCE.backKneeX, KICK_POSE.knee, swing);
        L.legL.hip.rotation.y = lerp(0, KICK_POSE.hipYaw, swing);
        L.hips.rotation.y = lerp(0, KICK_POSE.waistYaw, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.15, swing);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX, 0.2);
      }
    } else {
      if (f.comboStage === 3){
        // uppercut — rear arm drives up from a low chamber instead of straight out
        L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX + 0.3, PUNCH_POSE.shoulder - 0.5, swing);
        L.armR.shoulder.rotation.z = lerp(STANCE.shoulderZ, -STANCE.shoulderZ - 0.35, swing);
        L.armR.elbow.rotation.x = lerp(STANCE.elbowX + 0.6, PUNCH_POSE.elbow, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX - 0.1, STANCE.chestLeanX + 0.22, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
        L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, 0.2);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, 0.2);
      } else if (f.comboStage === 2){
        // cross — the lead arm (armL) snaps out so it reads as a distinct second hit from the jab
        L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, PUNCH_POSE.shoulder, swing);
        L.armL.elbow.rotation.x = lerp(STANCE.elbowX, PUNCH_POSE.elbow, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX + 0.1, swing);
        L.hips.rotation.y = lerp(0, -0.2, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
        L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armR.elbow.rotation.x = lerp(L.armR.elbow.rotation.x, STANCE.elbowX, 0.2);
      } else {
        // rear arm (armR) drives the elbow straight for a cross/jab
        L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX, PUNCH_POSE.shoulder, swing);
        L.armR.elbow.rotation.x = lerp(STANCE.elbowX, PUNCH_POSE.elbow, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX + 0.08, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
        L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, 0.2);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, 0.2);
      }
    }
    if (t >= 1){
      if (f.queuedAction && f.comboStage < 3){
        const nextType = f.queuedAction;
        const nextStage = (f.attackType === nextType) ? f.comboStage + 1 : 1;
        startAttackStage(f, nextType, nextStage, now);
      } else {
        // NOTE: comboStage is intentionally left as-is (not zeroed) here — tryAttack()
        // reads it to decide whether the next press continues the string, using
        // comboExpireAt (a real deadline) rather than this flag to know when it's stale.
        f.state = 'idle';
      }
    }
    return;
  }

  if (f.state === 'throwWhiff'){
    L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, -0.9, 0.3);
    L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, 0.2, 0.3);
    if (now - f.attackStart > 350) f.state = 'idle';
    return;
  }

  if (f.state === 'throw' || f.state === 'thrown'){
    animateThrow(f);
    return;
  }

  if (f.state === 'thrownDown'){
    // stay down for a beat after landing so a throw clearly reads as a throw,
    // instead of popping back upright immediately.
    const THROWN_DOWN_MS = 700, GET_UP_MS = 220;
    const elapsed = now - f.thrownDownStart;
    const downT = THREE.MathUtils.clamp(elapsed / 130, 0, 1);
    const upT = THREE.MathUtils.clamp((elapsed - (THROWN_DOWN_MS - GET_UP_MS)) / GET_UP_MS, 0, 1);
    const lieAmount = downT * (1 - upT);
    f.mesh.rotation.x = lerp(0, Math.PI/2*0.85, lieAmount);
    f.mesh.position.y = lerp(0, 0.16, lieAmount);
    if (elapsed >= THROWN_DOWN_MS){
      f.mesh.rotation.set(0,0,0);
      f.mesh.position.y = 0;
      f.state = 'idle';
    }
    return;
  }

  if (f.state === 'knockdown'){
    // a clean uppercut knocks the opponent onto their back — distinct from being thrown
    // (falls backward, not forward-prone) and from a KO (gets back up after a beat).
    const KNOCKDOWN_MS = 900, GET_UP_MS = 260;
    const elapsed = now - f.knockdownStart;
    const downT = THREE.MathUtils.clamp(elapsed / 150, 0, 1);
    const upT = THREE.MathUtils.clamp((elapsed - (KNOCKDOWN_MS - GET_UP_MS)) / GET_UP_MS, 0, 1);
    const lieAmount = downT * (1 - upT);
    f.mesh.rotation.x = lerp(0, -Math.PI/2*0.8, lieAmount);
    f.mesh.position.y = lerp(0, 0.14, lieAmount);
    if (elapsed >= KNOCKDOWN_MS){
      f.mesh.rotation.set(0,0,0);
      f.mesh.position.y = 0;
      f.state = 'idle';
    }
    return;
  }

  if (f.state === 'hitstun'){
    L.chest.rotation.x = lerp(L.chest.rotation.x, STANCE.chestLeanX + 0.35, 0.3);
    L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX - 0.5, 0.3);
    L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX - 0.5, 0.3);
    L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
    L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
    if (now > f.hitstunUntil) f.state = 'idle';
    return;
  }

  if (f.state === 'down'){
    const el = THREE.MathUtils.clamp((now - (f.downStart || (f.downStart = now))) / 500, 0, 1);
    if (f.downType === 'prone'){
      f.mesh.rotation.x = lerp(0, Math.PI/2*0.92, el);
      f.mesh.position.y = lerp(0, 0.18, el);
    } else {
      L.legR.hip.rotation.x = lerp(STANCE.frontHipX, -1.3, el);
      L.legR.knee.rotation.x = lerp(STANCE.frontKneeX, 1.7, el);
      L.legL.hip.rotation.x = lerp(STANCE.backHipX, -1.3, el);
      L.legL.knee.rotation.x = lerp(STANCE.backKneeX, 1.7, el);
      L.chest.rotation.x = lerp(STANCE.chestLeanX, 0.6, el);
      f.mesh.position.y = lerp(0, -0.42, el);
    }
    return;
  }

  // idle / guard / walking — hold the fighting stance
  blendStance(f, 0.2);
}

function animateThrow(f){
  const data = f.throwInfo;
  if (!data) return;
  const now = performance.now();
  const t = THREE.MathUtils.clamp((now - data.start) / data.duration, 0, 1);
  const lerp = THREE.MathUtils.lerp;
  const isThrower = f.state === 'throw';
  const target = isThrower ? null : f;

  if (!isThrower){
    let toX = data.targetX0, toZ = data.targetZ0;
    if (data.kind === 'seoi_nage'){
      const dir = data.targetX0 >= data.throwerX ? -1 : 1; // flipped behind thrower
      toX = data.throwerX + dir * 1.4;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = lerp(0, Math.PI*2, t);
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.1;
    } else if (data.kind === 'aikido_up' || data.kind === 'aikido_down'){
      const dirZ = data.kind === 'aikido_up' ? -1 : 1;
      toZ = THREE.MathUtils.clamp(data.targetZ0 + dirZ*1.6, -ARENA_Z, ARENA_Z);
      f.mesh.position.x = lerp(data.targetX0, data.throwerX + (data.targetX0<data.throwerX?-0.6:0.6), t);
      f.mesh.position.z = lerp(data.targetZ0, toZ, t);
      f.mesh.rotation.z = lerp(0, Math.PI*1.4, t);
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.3;
    } else if (data.kind === 'dragon_screw'){
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 1.1;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.rotation.y = lerp(0, Math.PI*3, t);
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.4;
    } else if (data.kind === 'koshi_nage'){
      // hip throw — countering the one-two's cross: stays on the same side and arcs
      // over the hip instead of flipping fully behind, reading as a quicker, tighter throw
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 1.0;
      toZ = THREE.MathUtils.clamp(data.throwerZ + (dir > 0 ? -1 : 1) * 1.1, -ARENA_Z, ARENA_Z);
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, toZ, t);
      f.mesh.rotation.z = lerp(0, dir * Math.PI*1.6, t);
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.0;
    } else if (data.kind === 'ura_nage'){
      // back suplex — countering the uppercut: the biggest arc, thrower falls backward
      // carrying the target up and over, landing furthest behind the thrower of any throw
      const dir = data.targetX0 >= data.throwerX ? -1 : 1;
      toX = data.throwerX + dir * 1.8;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = lerp(0, -Math.PI*2, t);
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.6;
    } else if (data.kind === 'duck_tackle'){
      // duck under the head kick and drive forward into a tackle — a low, ground-level
      // takedown (no aerial arc) rather than a hip/shoulder throw
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 1.6;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = lerp(0, Math.PI*0.55, t);
      f.mesh.position.y = Math.max(0, Math.sin(Math.PI*t) * 0.5);
    } else { // achilles_lock — catch the rolling sobat's kicking leg and drop into a hold;
      // minimal travel and a quick low drop, then held (longest duration of any throw)
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 0.9;
      const dropT = Math.min(t*1.4, 1);
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.z = lerp(0, dir * Math.PI*0.5, dropT);
      f.mesh.position.y = Math.sin(Math.PI*dropT) * 0.35;
    }
    if (t >= 1){
      f.mesh.position.y = 0;
      f.mesh.rotation.set(0,0,0);
      f.throwInfo = null;
      if (!data.applied){
        data.applied = true;
        SFX.throwHit();
        applyDamage(f, data.dmg, 'throw'); // may set f.state = 'down' if this KOs
      }
      if (f.state !== 'down'){
        f.state = 'thrownDown';
        f.thrownDownStart = now;
      }
    }
  } else {
    const L = f.mesh.userData.limbs;
    L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, -1.5, Math.sin(Math.PI*t));
    L.armL.elbow.rotation.x = lerp(STANCE.elbowX, 0.15, Math.sin(Math.PI*t));
    if (t >= 1){ f.state = 'idle'; f.throwInfo = null; }
  }
}

/* =========================================================
   FX helpers
   ========================================================= */
function flashHit(f){
  f.flashUntil = performance.now() + 140;
  if (Net.isHost) netSend({ t:'ev', name:'flashHit', who: f === player ? 'p' : 'c' });
}
function updateFlash(f){
  const L = f.mesh.userData.limbs;
  const on = performance.now() < f.flashUntil;
  L.hitMeshes.forEach(m => {
    m.material.emissive = m.material.emissive || new THREE.Color(0);
    m.material.emissive.setHex(on ? 0xffffff : 0x000000);
    m.material.emissiveIntensity = on ? 0.8 : 0;
  });
}

const centerText = document.getElementById('centerText');
let centerTimer = null;

/* =========================================================
   Round / match flow
   ========================================================= */
let matchState = 'intro'; // intro | countdown | fighting | roundEnd | matchEnd
let roundNumber = 1;
const WINS_NEEDED = 2;

function resetFighter(f, x){
  f.hp = 100; f.state = 'idle'; f.guard = false; f.posTween = null; f.throwInfo = null;
  f.attackResolved = true; f.downType = null; f.downStart = null;
  f.comboStage = 0; f.comboExpireAt = 0; f.queuedAction = null; f.comboDecided = true;
  f.knockdownStart = 0; f.lastAttack = { type:null, stage:0, time:-9999 };
  f.mesh.position.set(x, 0, 0);
  resetPose(f);
  updateFlash(f);
}

function startRound(){
  resetFighter(player, -1.6);
  resetFighter(cpu, 1.6);
  updateHpUI();
  matchState = 'countdown';
  flashCenterText('ROUND ' + roundNumber, '', 900);
  setTimeout(() => {
    flashCenterText('FIGHT!', '', 700);

function endRound(winner){

    matchState = 'matchEnd';
    flashCenterText((winner === player ? 'YOU WIN!' : 'CPU WINS'), 'MATCH OVER', 3000);
    SFX.win();
    setTimeout(showFinalOverlay, 1600);
  } else {
    flashCenterText((winner === player ? 'YOU WIN ROUND' : 'CPU WINS ROUND'), '', 1400);
