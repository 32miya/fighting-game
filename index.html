<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>3D POLYGON FIGHTER</title>
<style>
  :root{ color-scheme: dark; }
  *{
    box-sizing:border-box; -webkit-tap-highlight-color:transparent;
    touch-action:none; user-select:none; -webkit-user-select:none;
    -webkit-touch-callout:none; -webkit-user-drag:none;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#0b0d14; color:#eef2ff;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    overscroll-behavior:none; touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #app{ position:fixed; inset:0; }
  #scene{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- HUD ---------- */
  #hud{
    position:absolute; top:0; left:0; right:0; pointer-events:none;
    padding:env(safe-area-inset-top,0) calc(10px + env(safe-area-inset-right,0)) 0 calc(10px + env(safe-area-inset-left,0));
  }
  .hpRow{ display:flex; align-items:center; gap:8px; margin-top:10px; }
  .hpRow.right{ flex-direction:row-reverse; }
  .barsCol{ flex:1; display:flex; flex-direction:column; gap:3px; }
  .hpWrap{ width:100%; height:16px; background:#000a; border:2px solid #444d66; border-radius:8px; overflow:hidden; position:relative; }
  .hpBar{ height:100%; width:100%; background:linear-gradient(90deg,#ffd23f,#ff5e3a); transition:width .25s ease-out; }
  .hpRow.right .hpBar{ margin-left:auto; }
  .spWrap{ width:100%; height:7px; background:#000a; border:1.5px solid #444d66; border-radius:5px; overflow:hidden; position:relative; }
  .spBar{ height:100%; width:0%; background:linear-gradient(90deg,#4da6ff,#8a5eff); transition:width .2s ease-out; }
  .hpRow.right .spBar{ margin-left:auto; }
  .spWrap.ready .spBar{ background:linear-gradient(90deg,#ffd23f,#ff9a3f); animation:spReadyPulse 1s ease-in-out infinite; }
  @keyframes spReadyPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.55; } }
  .name{ width:74px; font-size:11px; font-weight:700; letter-spacing:.05em; text-shadow:0 1px 3px #000; flex-shrink:0; }
  .hpRow.right .name{ text-align:right; }
  .pips{ display:flex; gap:4px; flex-shrink:0; }
  .hpRow.right .pips{ flex-direction:row-reverse; }
  .pip{ width:12px; height:12px; border-radius:50%; border:2px solid #ffd23f; background:transparent; }
  .pip.on{ background:#ffd23f; }

  #centerText{
    position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
    text-align:center; pointer-events:none; z-index:5;
  }
  #centerText .big{ font-size:clamp(28px,7vw,56px); font-weight:800; letter-spacing:.08em; text-shadow:0 3px 10px #000, 0 0 20px #ff5e3a99; opacity:0; }
  #centerText .small{ font-size:clamp(13px,3vw,18px); margin-top:6px; opacity:.85; }
  #centerText.show .big{ animation: pop .5s ease-out forwards; }
  @keyframes pop{ 0%{ transform:scale(.4); opacity:0; } 60%{ transform:scale(1.12); opacity:1; } 100%{ transform:scale(1); opacity:1; } }

  #comboCounter{
    position:absolute; top:20%; left:50%; transform:translate(-50%,-50%) scale(.4);
    font-size:clamp(20px,5.5vw,34px); font-weight:800; letter-spacing:.05em; color:#fff;
    text-shadow:0 2px 8px #000, 0 0 16px #ff9a3fbb; opacity:0; pointer-events:none; z-index:6;
  }
  #comboCounter.show{ animation:comboPop .35s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes comboPop{
    0%{ transform:translate(-50%,-50%) scale(.4); opacity:0; }
    60%{ transform:translate(-50%,-50%) scale(1.18); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
  }

  /* big dramatic callout for a landed special move / counter / K.O. — distinct from the
     plain #centerText used for ROUND/FIGHT/MISS so it reads as a bigger deal */
  #specialCallout{
    position:absolute; top:27%; left:50%; transform:translate(-50%,-50%) scale(.4);
    font-size:clamp(24px,7vw,46px); font-weight:800; letter-spacing:.05em; color:#fff;
    text-shadow:0 3px 10px #000, 0 0 20px currentColor, 0 0 40px currentColor;
    opacity:0; pointer-events:none; z-index:16; white-space:nowrap;
  }
  #specialCallout.show{ animation:specialCalloutPop 900ms cubic-bezier(.2,1.4,.4,1) both; }
  @keyframes specialCalloutPop{
    0%{ transform:translate(-50%,-50%) scale(.4) rotate(-4deg); opacity:0; }
    18%{ transform:translate(-50%,-50%) scale(1.18) rotate(2deg); opacity:1; }
    28%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    82%{ opacity:1; }
    100%{ opacity:0; }
  }

  /* full-screen flash for impact frames (special hits / K.O.) */
  #impactFlash{
    position:fixed; inset:0; pointer-events:none; z-index:40; opacity:0; background:#fff;
  }
  #impactFlash.show{ animation:impactFlashPop var(--flash-ms,180ms) ease-out both; }
  @keyframes impactFlashPop{ 0%{ opacity:.7; } 100%{ opacity:0; } }

  /* location-tracked "HIT!"/"GUARD" popup — spawned at the defender's projected screen
     position so success/failure of an attack reads clearly without watching the HP bar.
     Styled like a manga impact bubble: a spiky starburst badge (three overlapping squares
     rotated 30deg apart) behind bold, thick-outlined italic text. */
  #hitPopupLayer{ position:fixed; inset:0; pointer-events:none; z-index:17; overflow:hidden; }
  .hitPopup{
    position:absolute; transform:translate(-50%,-50%) scale(.3) rotate(-10deg);
    font-size:clamp(15px,3.8vw,23px); animation:hitPopupFloat 700ms cubic-bezier(.22,1.6,.4,1) both;
  }
  .hitPopup .burst, .hitPopup .burst::before, .hitPopup .burst::after{
    content:''; position:absolute; left:50%; top:50%; width:3.6em; height:3.6em;
    background:var(--pop-color, #ff5e3a); transform:translate(-50%,-50%);
    filter:drop-shadow(0 3px 5px #0008); z-index:0;
  }
  .hitPopup .burst::before{ transform:translate(-50%,-50%) rotate(30deg); }
  .hitPopup .burst::after{ transform:translate(-50%,-50%) rotate(60deg); }
  .hitPopup .label{
    position:relative; z-index:1; display:block; font-weight:900; font-style:italic;
    letter-spacing:.02em; white-space:nowrap; color:#fff; padding:0 .3em;
    -webkit-text-stroke:1.5px #241a10; paint-order:stroke fill;
    text-shadow:2px 2px 0 rgba(0,0,0,.45);
  }
  @keyframes hitPopupFloat{
    0%{ transform:translate(-50%,-50%) scale(.25) rotate(-16deg) translateY(0); opacity:0; }
    16%{ transform:translate(-50%,-50%) scale(1.35) rotate(6deg) translateY(-4px); opacity:1; }
    30%{ transform:translate(-50%,-50%) scale(1) rotate(-3deg) translateY(-10px); opacity:1; }
    78%{ transform:translate(-50%,-50%) scale(1) rotate(-3deg) translateY(-16px); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(.9) rotate(-3deg) translateY(-46px); opacity:0; }
  }

  .pip.pop{ animation:pipPop .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pipPop{ 0%{ transform:scale(1); } 40%{ transform:scale(1.8); box-shadow:0 0 12px #ffd23f; } 100%{ transform:scale(1); } }

  #overlay{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:#000c; z-index:20; flex-direction:column; gap:14px; text-align:center; padding:20px;
    overflow:hidden;
  }
  #overlay.show{ display:flex; }
  #overlay.win{ background:radial-gradient(ellipse at 50% 40%, #4a3400dd 0%, #000c 72%); }
  #overlay h1{ position:relative; font-size:clamp(22px,5vw,34px); margin:0; letter-spacing:.05em; }
  #overlay p{ position:relative; margin:0; opacity:.75; font-size:14px; }
  #overlay button{
    position:relative; pointer-events:auto; font-size:16px; font-weight:700; padding:12px 28px; border-radius:30px;
    border:2px solid #ffd23f; background:#ffd23f22; color:#ffd23f; letter-spacing:.05em;
  }
  #overlay button.ghost{
    border-color:#ffffff55; color:#ccc; background:transparent; font-size:13px; padding:10px 22px;
  }
  #overlayBtnRow{ position:relative; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

  #overlay.win h1#overlayTitle{
    font-size:clamp(30px,7.5vw,52px); font-weight:800;
    background:linear-gradient(90deg,#fff8d0,#ffd23f,#ff9a3f,#ffd23f,#fff8d0);
    background-size:300% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 26px #ffd23f77;
    animation:titleShine 2.2s linear infinite, titlePop .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes titleShine{ 0%{ background-position:0% 50%; } 100%{ background-position:300% 50%; } }
  @keyframes titlePop{
    0%{ transform:scale(.3) rotate(-8deg); opacity:0; }
    60%{ transform:scale(1.15) rotate(3deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg); }
  }

  #winBadge{
    display:none; position:relative; font-size:13px; font-weight:800; letter-spacing:.25em;
    padding:7px 20px; border-radius:20px; background:linear-gradient(90deg,#ffd23f,#ff9a3f);
    color:#3a2400; box-shadow:0 0 22px #ffd23f99;
  }
  #overlay.win #winBadge{
    display:inline-block; animation:badgeBounce .5s ease-out .35s both;
  }
  @keyframes badgeBounce{
    0%{ transform:translateY(-16px) scale(.6); opacity:0; }
    70%{ transform:translateY(2px) scale(1.06); opacity:1; }
    100%{ transform:translateY(0) scale(1); }
  }

  #overlayScore{ font-size:clamp(22px,5.5vw,36px); font-weight:800; letter-spacing:.08em; color:#eef2ff; }
  #overlay.win #overlayScore{ color:#ffd23f; text-shadow:0 2px 10px #000; }

  #confettiLayer{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .confettiPiece{
    position:absolute; top:-6%; width:8px; height:14px; opacity:.95;
    animation-name:confettiFall; animation-timing-function:ease-in; animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform:translate(var(--drift,20px), 115vh) rotate(var(--spin,540deg)); opacity:.85; }
  }

  #stageSelect{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:#000d; z-index:30; flex-direction:column; gap:16px; text-align:center; padding:20px;
  }
  #stageSelect.hide{ display:none; }
  #stageSelect h1{ font-size:clamp(18px,4.5vw,28px); margin:0; letter-spacing:.05em; }
  #stageGrid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    width:100%; max-width:620px; pointer-events:auto;
  }
  .stageBtn{
    padding:14px 6px; border-radius:14px; font-size:13px; font-weight:700; line-height:1.4;
    border:2px solid #ffffff44; color:#fff; letter-spacing:.02em;
  }
  .stageBtn:active{ transform:scale(0.96); }
  .stageBtn[data-stage="colosseum"]{ background:linear-gradient(160deg,#cbb07a55,#8fc7e855); border-color:#e0c98a; }
  .stageBtn[data-stage="beach"]{ background:linear-gradient(160deg,#ff9a5a55,#ffe28a55); border-color:#ffb070; }
  .stageBtn[data-stage="dome"]{ background:linear-gradient(160deg,#2a5fa855,#14141c88); border-color:#7ab0ff; }
  .stageBtn[data-stage="grass"]{ background:linear-gradient(160deg,#3f7d3a55,#8fd0f055); border-color:#8ee07a; }
  .stageBtn[data-stage="volcano"]{ background:linear-gradient(160deg,#ff5a1a55,#3a181088); border-color:#ff8a50; }
  .stageBtn[data-stage="dojo"]{ background:linear-gradient(160deg,#a9743f55,#2a201888); border-color:#d8b06a; }

  #modeSelect, #onlinePanel, #waitHostPanel, #difficultySelect, #characterSelect{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:#000d; z-index:31; flex-direction:column; gap:14px; text-align:center; padding:20px;
  }
  #modeSelect.hide, #onlinePanel.hide, #waitHostPanel.hide, #difficultySelect.hide, #characterSelect.hide{ display:none; }
  #modeSelect h1, #onlinePanel h1, #waitHostPanel h1, #difficultySelect h1, #characterSelect h1{ font-size:clamp(18px,4.5vw,28px); margin:0 0 6px; letter-spacing:.05em; }
  #characterGrid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    width:100%; max-width:520px; pointer-events:auto;
  }
  .characterBtn{
    padding:14px 6px; border-radius:14px; font-size:13px; font-weight:700; line-height:1.4;
    border:2px solid #ffffff44; color:#fff; letter-spacing:.02em;
  }
  .characterBtn:active{ transform:scale(0.96); }
  .characterBtn[data-costume="gi"]{ background:linear-gradient(160deg,#f0ebe055,#c9a97d55); border-color:#e0c98a; }
  .characterBtn[data-costume="wrestler"]{ background:linear-gradient(160deg,#ffd23f55,#24201a99); border-color:#ffd23f; }
  .characterBtn[data-costume="soldier"]{ background:linear-gradient(160deg,#5c6b3f55,#2a3a2099); border-color:#8ee07a; }
  .characterBtn[data-costume="mma"]{ background:linear-gradient(160deg,#e8b48c55,#1a1a1a99); border-color:#ff8a4d; }
  .characterBtn[data-costume="hero"]{ background:linear-gradient(160deg,#ffd23f55,#ff5e3a55); border-color:#ff5e3a; }
  .menuBtn{
    pointer-events:auto; font-size:15px; font-weight:700; padding:14px 30px; border-radius:16px;
    border:2px solid #ffd23f; background:#ffd23f18; color:#ffd23f; letter-spacing:.05em;
  }
  .menuBtn:active{ background:#ffd23f33; }
  .menuBtn.ghost{ border-color:#ffffff55; color:#ccc; background:transparent; font-size:13px; padding:10px 22px; }
  #onlinePanel input{
    font-size:16px; padding:10px 14px; border-radius:10px; border:2px solid #ffffff44;
    background:#ffffff10; color:#fff; text-align:center; width:220px; letter-spacing:.05em;
    pointer-events:auto;
  }
  #hostIdBox{ display:flex; flex-direction:column; gap:8px; align-items:center; }
  #hostIdBox.hide{ display:none; }
  #hostIdText{
    font-size:22px; font-weight:800; letter-spacing:.12em; padding:10px 18px;
    border:2px dashed #ffd23f; border-radius:10px; color:#ffd23f; background:#00000040;
  }
  .netDivider{ opacity:.55; font-size:12px; margin:4px 0; }
  .netStatus{ font-size:13px; opacity:.85; min-height:18px; }

  #hint{
    position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    font-size:10px; opacity:.5; display:none; pointer-events:none;
  }
  @media (orientation:portrait){ #hint{ display:block; } }

  #errBanner{
    display:none; position:fixed; left:0; right:0; bottom:0; max-height:35%;
    background:#a00000ee; color:#fff; font-size:11px; line-height:1.4;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom,0));
    z-index:9999; word-break:break-all; overflow-y:auto; pointer-events:none;
  }
  #errBanner.show{ display:block; }

  /* ---------- Danmaku (niconico-style scrolling chat) ---------- */
  #danmaku{
    position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:15;
  }
  .danmakuItem{
    position:absolute; right:-10%; white-space:nowrap; font-size:clamp(14px,3.6vw,20px);
    font-weight:700; color:#fff; text-shadow:0 1px 3px #000, 0 0 8px #000;
    animation-name:danmakuScroll; animation-timing-function:linear; animation-fill-mode:forwards;
  }
  @keyframes danmakuScroll{ from{ transform:translateX(0); } to{ transform:translateX(-130vw); } }

  #spectatorChat{
    position:absolute; left:0; right:0; bottom:0;
    padding:0 calc(14px + env(safe-area-inset-right,0)) calc(10px + env(safe-area-inset-bottom,10px)) calc(14px + env(safe-area-inset-left,0));
    display:flex; gap:8px; pointer-events:auto;
  }
  #spectatorChat.hide{ display:none; }
  #chatInput{
    flex:1; min-width:0; font-size:14px; padding:10px 12px; border-radius:12px;
    border:1.5px solid #ffffff66; background:rgba(8,10,16,0.6); color:#fff;
  }
  #chatSendBtn{
    flex-shrink:0; font-size:14px; font-weight:700; padding:10px 18px; border-radius:12px;
    border:1.5px solid #ffd23f; background:#ffd23f18; color:#ffd23f;
  }

  /* ---------- Controls ---------- */
  #controls{
    position:absolute; left:0; right:0; bottom:0;
    display:flex; justify-content:space-between; align-items:flex-end;
    padding:0 calc(14px + env(safe-area-inset-right,0)) env(safe-area-inset-bottom,14px) calc(14px + env(safe-area-inset-left,0));
    pointer-events:none;
  }
  #dpad, #actions{ position:relative; width:150px; height:150px; pointer-events:auto; }
  .ctlBtn{
    position:absolute; display:flex; align-items:center; justify-content:center;
    width:50px; height:50px; border-radius:12px;
    background:rgba(8,10,16,0.6); border:1.5px solid #ffffff66; color:#fff;
    font-size:18px; font-weight:700; backdrop-filter:blur(3px) brightness(0.85);
    text-shadow:0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6);
    box-shadow:0 1px 6px rgba(0,0,0,0.4);
  }
  .ctlBtn:active{ background:rgba(30,32,40,0.75); }
  #dpad .ctlBtn{ border-radius:10px; }
  #dUp{ top:0; left:50px; } #dDown{ top:100px; left:50px; }
  #dLeft{ top:50px; left:0; } #dRight{ top:50px; left:100px; }

  #actions .ctlBtn{ width:56px; height:56px; border-radius:50%; font-size:18px; }
  #btnC{ top:0; left:47px; border-color:#ff8a4d; color:#ffcaa8; }
  #btnB{ top:47px; left:94px; border-color:#8a5eff; color:#d6c6ff; }
  #btnA{ top:94px; left:47px; border-color:#4da6ff; color:#a9d4ff; }
  #btnD{ top:47px; left:0px; border-color:#ff5e5e; color:#ffb3b3; }
  #btnA.active{ background:rgba(77,166,255,0.45); }
  #btnSpecial{
    top:55px; left:55px; width:40px; height:40px; font-size:11px;
    border-color:#ffd23f; color:#ffd23f; display:none;
  }
  #btnSpecial.show{ display:flex; animation:specialBtnPulse 1s ease-in-out infinite; }
  @keyframes specialBtnPulse{
    0%,100%{ transform:scale(1); box-shadow:0 0 10px #ffd23f99; }
    50%{ transform:scale(1.12); box-shadow:0 0 22px #ffd23fdd; }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>
  <div id="danmaku"></div>

  <div id="hud">
    <div class="hpRow">
      <div class="name">PLAYER</div>
      <div class="barsCol">
        <div class="hpWrap"><div class="hpBar" id="hpP"></div></div>
        <div class="spWrap" id="spWrapP"><div class="spBar" id="spP"></div></div>
      </div>
      <div class="pips" id="pipsP"><span class="pip"></span><span class="pip"></span></div>
    </div>
    <div class="hpRow right">
      <div class="name">CPU</div>
      <div class="barsCol">
        <div class="hpWrap"><div class="hpBar" id="hpC"></div></div>
        <div class="spWrap" id="spWrapC"><div class="spBar" id="spC"></div></div>
      </div>
      <div class="pips" id="pipsC"><span class="pip"></span><span class="pip"></span></div>
    </div>
  </div>

  <div id="centerText"><div class="big"></div><div class="small"></div></div>
  <div id="comboCounter"></div>
  <div id="specialCallout"></div>
  <div id="impactFlash"></div>
  <div id="hitPopupLayer"></div>
  <div id="hint">横向き表示推奨 / Rotate for best experience</div>
  <div id="errBanner"></div>

  <div id="overlay">
    <div id="confettiLayer"></div>
    <div id="winBadge">WINNER</div>
    <h1 id="overlayTitle">3D POLYGON FIGHTER</h1>
    <p id="overlayScore"></p>
    <p id="overlaySub">タップして試合開始</p>
    <div id="overlayBtnRow">
      <button id="overlayBtn">START</button>
      <button id="overlayTitleBtn" class="ghost">タイトルへ</button>
    </div>
  </div>

  <div id="modeSelect">
    <h1>対戦モードを選択</h1>
    <button class="menuBtn" id="modeCpuBtn">CPUと対戦</button>
    <button class="menuBtn" id="modeOnlineBtn">オンライン対戦 (P2P)</button>
  </div>

  <div id="characterSelect" class="hide">
    <h1>キャラクターを選択</h1>
    <div id="characterGrid">
      <button class="characterBtn" data-costume="gi">道着<br>ファイター</button>
      <button class="characterBtn" data-costume="wrestler">プロレスラー</button>
      <button class="characterBtn" data-costume="soldier">ソルジャー</button>
      <button class="characterBtn" data-costume="mma">総合格闘家</button>
      <button class="characterBtn" data-costume="hero">ヒーロー</button>
    </div>
    <button class="menuBtn ghost" id="characterBackBtn">戻る</button>
  </div>

  <div id="difficultySelect" class="hide">
    <h1>CPUの強さを選択</h1>
    <button class="menuBtn" id="diffNoviceBtn">練習生</button>
    <button class="menuBtn" id="diffMasterBtn">師範</button>
    <button class="menuBtn" id="diffExpertBtn">達人</button>
    <button class="menuBtn ghost" id="difficultyBackBtn">戻る</button>
  </div>

  <div id="onlinePanel" class="hide">
    <h1>オンライン対戦</h1>
    <button class="menuBtn" id="hostCreateBtn">部屋を作る（ホスト）</button>
    <div id="hostIdBox" class="hide">
      <p style="margin:0;opacity:.8;font-size:12px;">この番号を相手に伝えてください（3分以内に接続がなければ自動的に閉じます）</p>
      <div id="hostIdText">-----</div>
      <button class="menuBtn ghost" id="copyIdBtn">コピー</button>
      <p class="netStatus" id="hostStatus">相手の接続を待っています…</p>
      <button class="menuBtn ghost" id="disbandBtn">部屋を解散する</button>

<script type="module">
import * as THREE from 'three';

/* Surface otherwise-silent runtime errors on-screen — there's no console
   access on a phone, so this is how a broken background/audio/etc. gets
   diagnosed instead of just failing invisibly. */
function showErrBanner(msg){
  const el = document.getElementById('errBanner');
  el.textContent = 'ERR: ' + String(msg).slice(0, 300);
  el.classList.add('show');
}
addEventListener('error', (e) => showErrBanner(e.message));
addEventListener('unhandledrejection', (e) => showErrBanner(e.reason && e.reason.message ? e.reason.message : e.reason));

/* =========================================================
   Renderer / Scene / Camera
   ========================================================= */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x11141d);
scene.fog = new THREE.Fog(0x11141d, 10, 26);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);

function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

/* =========================================================
   Lock down mobile browser gestures that fight the game UI:
   pinch-zoom, double-tap-zoom, long-press callouts, drag, etc.
   ========================================================= */
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('gesturechange', (e) => e.preventDefault());
document.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('dragstart', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive:false });
// 300ms was too tight once combos rewarded mashing the same button with gaps well past that
// (the combo-continue window is several hundred ms longer), so taps spaced e.g. 350-450ms
// apart slipped past this guard and still triggered the OS's native double-tap-zoom.
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  if (e.target.tagName === 'INPUT') return; // never block focus/keyboard on text fields (chat, room code)
  const now = Date.now();
  if (now - lastTouchEnd <= 600) e.preventDefault();
  lastTouchEnd = now;
}, { passive:false });

const hemiLight = new THREE.HemisphereLight(0xaabbff, 0x1a1420, 0.9);
scene.add(hemiLight);

/* =========================================================
   Stage backgrounds — built on demand once the player picks one
   ========================================================= */
function makeCanvasTexture(size, draw, repeatX, repeatY){
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = size;
  draw(cnv.getContext('2d'), size);
  const tex = new THREE.CanvasTexture(cnv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}

function speckleTexture(base, specks){
  return makeCanvasTexture(128, (ctx, s) => {
    ctx.fillStyle = base; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 420; i++){
      ctx.fillStyle = specks[Math.floor(Math.random()*specks.length)];
      const x = Math.random()*s, y = Math.random()*s, r = Math.random()*1.6+0.3;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    }
  }, 6, 6);
}

function woodTexture(){
  return makeCanvasTexture(128, (ctx, s) => {
    ctx.fillStyle = '#a9743f'; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 8; i++){
      ctx.fillStyle = i % 2 ? 'rgba(0,0,0,0.10)' : 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, i*16, s, 2);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    for (let i = 0; i < 40; i++){
      let x = Math.random()*s, y = Math.random()*s;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+Math.random()*20-10, y); ctx.stroke();
    }
  }, 6, 6);
}

function stoneTexture(){
  return makeCanvasTexture(128, (ctx, s) => {
    ctx.fillStyle = '#4a4640'; ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = 'rgba(15,10,8,0.75)'; ctx.lineWidth = 2;
    for (let i = 0; i < 10; i++){
      let x = Math.random()*s, y = Math.random()*s;
      ctx.beginPath(); ctx.moveTo(x, y);
      for (let j = 0; j < 5; j++){ x += Math.random()*24-12; y += Math.random()*24-12; ctx.lineTo(x, y); }
      ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    for (let i = 0; i <= 4; i++){
      ctx.beginPath(); ctx.moveTo(i*s/4, 0); ctx.lineTo(i*s/4, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*s/4); ctx.lineTo(s, i*s/4); ctx.stroke();
    }
  }, 5, 5);
}

const stageGroup = new THREE.Group();
scene.add(stageGroup);

function clearStage(){
  for (const obj of [...stageGroup.children]){
    stageGroup.remove(obj);
    obj.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
    });
  }
}

function lightAtmosphere(hemiSky, hemiGround, hemiI, keyColor, keyI){
  hemiLight.color.set(hemiSky); hemiLight.groundColor.set(hemiGround); hemiLight.intensity = hemiI;
  keyLight.color.set(keyColor); keyLight.intensity = keyI;
}

const textureLoader = new THREE.TextureLoader();
function setStageBackground(path, fogColor, fogNear, fogFar){
  scene.background = new THREE.Color(fogColor); // shown instantly while the photo loads in
  scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);
  const applyTexture = (tex) => {
    // NPOT-safe settings: some mobile GPUs/WebGL1 contexts silently fail to
    // mipmap a non-power-of-two image, leaving scene.background on the
    // fallback color instead of throwing a visible error.
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.generateMipmaps = false;
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.wrapS = THREE.ClampToEdgeWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.needsUpdate = true;
    scene.background = tex;
  };
  textureLoader.load(path, applyTexture, undefined, () => {
    // transient mobile-network hiccup — retry once before giving up
    setTimeout(() => {
      textureLoader.load(path, applyTexture, undefined, (err) => {
        console.error('stage background failed to load:', path, err);
      });
    }, 1200);
  });
}
