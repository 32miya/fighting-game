/* =========================================================
   Input: directional pad with double-tap detection
   ========================================================= */
const input = { up:false, down:false, left:false, right:false };
const lastTap = { up:0, down:0, left:0, right:0 };
const DOUBLE_TAP_MS = 320;

function bindDir(id, dir){
  const el = document.getElementById(id);
  const press = (e) => {
    e.preventDefault();
    if (Net.isSpectator) return; // spectators are view-only
    const now = performance.now();
    input[dir] = true;
    SFX.tap();
    if (Net.isGuest) netSend({ t:'input', action:'moveHold', dir, held:true });
    if (now - lastTap[dir] < DOUBLE_TAP_MS && now - lastTap[dir] > 30){
      if (Net.isGuest) netSend({ t:'input', action:'doubleTap', dir });
      else handleDoubleTap(player, dir);
      lastTap[dir] = 0;
    } else {
      lastTap[dir] = now;
    }
  };
  const release = (e) => {
    e.preventDefault();
    if (Net.isSpectator) return;
    input[dir] = false;
    if (Net.isGuest) netSend({ t:'input', action:'moveHold', dir, held:false });
  };
  el.addEventListener('pointerdown', press);
  el.addEventListener('pointerup', release);
  el.addEventListener('pointerleave', release);
  el.addEventListener('pointercancel', release);
}
bindDir('dUp','up'); bindDir('dDown','down'); bindDir('dLeft','left'); bindDir('dRight','right');

function handleDoubleTap(f, dir){
  if (matchState !== 'fighting') return;
  const o = other(f);
  if (dir === 'left' || dir === 'right'){
    const towardDir = f.mesh.position.x <= o.mesh.position.x ? 'right' : 'left';
    if (dir === towardDir) dashIn(f); else backstep(f);
  } else if (dir === 'up'){
    axisShift(f, -1);
  } else {
    axisShift(f, 1);
  }
}

function bindAction(id, actionName, isGuard){
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (matchState !== 'fighting' || Net.isSpectator) return;
    SFX.tap();
    if (isGuard){
      el.classList.add('active');
      if (Net.isGuest) netSend({ t:'input', action:'guardOn' });
      else if (player.state === 'idle') player.guard = true;
    } else if (Net.isGuest){
      netSend({ t:'input', action:actionName });
    } else if (actionName === 'throw'){
      tryThrow(player);
    } else {
      tryAttack(player, actionName);
    }
  });
  if (isGuard){
    const release = (e) => {
      e.preventDefault();
      if (Net.isSpectator) return;
      el.classList.remove('active');
      if (Net.isGuest) netSend({ t:'input', action:'guardOff' });
      else player.guard = false;
    };
    el.addEventListener('pointerup', release);
    el.addEventListener('pointerleave', release);
    el.addEventListener('pointercancel', release);
  }
}
bindAction('btnA', null, true);
bindAction('btnB', 'throw');
bindAction('btnC', 'kick');
bindAction('btnD', 'punch');

/* =========================================================
   Continuous walk (single hold) — shared by local player input
   and, on the host, the remote guest's held directions.
   ========================================================= */
function updateWalk(f, src, dt){
  if (f.state !== 'idle' || f.posTween || matchState !== 'fighting') return;
  const speed = 2.1, speedZ = 1.4;
  if (src.left)  f.mesh.position.x -= speed * dt;
  if (src.right) f.mesh.position.x += speed * dt;
  if (src.up)    f.mesh.position.z -= speedZ * dt;
  if (src.down)  f.mesh.position.z += speedZ * dt;
  f.mesh.position.x = THREE.MathUtils.clamp(f.mesh.position.x, -ARENA_X, ARENA_X);
  f.mesh.position.z = THREE.MathUtils.clamp(f.mesh.position.z, -ARENA_Z, ARENA_Z);
  clampSeparation(f);
}

// Three CPU tiers — 練習生 (novice) never chains and rarely reacts, 師範 (master) chains up to
// the 2nd hit and reacts respectably, 達人 (expert) uses full 3-hit combos and reacts fast enough
// to catch the stage-matched counter-throw window most of the time.
const CPU_DIFFICULTY = {
  novice: { reactionMs:[500, 900], counterChance:0.15, guardChance:0.25, comboChance:0.15, maxCombo:1, dashChance:0.2,  kickBias:0.4 },
  master: { reactionMs:[280, 520], counterChance:0.35, guardChance:0.45, comboChance:0.55, maxCombo:2, dashChance:0.35, kickBias:0.5 },
  expert: { reactionMs:[140, 300], counterChance:0.55, guardChance:0.60, comboChance:0.85, maxCombo:3, dashChance:0.5,  kickBias:0.5 },
};
let cpuDifficulty = 'novice';

function updateCpuAI(){
  if (matchState !== 'fighting') return;
  const cfg = CPU_DIFFICULTY[cpuDifficulty];
  const now = performance.now();
  if (cpu.guard && now > cpu.guardReleaseAt) cpu.guard = false;

  // continue an in-progress combo independent of the decision timer, so the chain doesn't
  // stall waiting for the next tick — rolled exactly once per hit via comboDecided.
  if (cpu.state === 'attack' && !cpu.comboDecided){
    cpu.comboDecided = true;
    if (cpu.comboStage < cfg.maxCombo && Math.random() < cfg.comboChance) cpu.queuedAction = cpu.attackType;
  }

  if (cpu.state !== 'idle') return;
  if (now < cpu.nextDecision) return;
  const [rMin, rMax] = cfg.reactionMs;
  cpu.nextDecision = now + rMin + Math.random()*(rMax-rMin);

  const dx = player.mesh.position.x - cpu.mesh.position.x;
  const dist = Math.abs(dx);
  const dz = Math.abs(player.mesh.position.z - cpu.mesh.position.z);

  if (player.state === 'attack' && !player.attackResolved && dist < 2.2){
    const r = Math.random();
    if (r < cfg.counterChance){ tryThrow(cpu); return; } // attempt the stage-matched counter-throw
    if (r < cfg.counterChance + cfg.guardChance){ cpu.guard = true; cpu.guardReleaseAt = now + 400; return; }
    axisShift(cpu, Math.random() < 0.5 ? -1 : 1);
    return;
  }

  if (dist > 2.6){ if (Math.random() < cfg.dashChance || dist > 3.4) dashIn(cpu); return; }
  if (dist > 1.15 && dz < 0.5){
    const dir = Math.sign(dx) || 1;
    cpu.mesh.position.x += dir * 0.9 * 0.35;
    clampSeparation(cpu);
    return;
  }

  const r = Math.random();
  if (r < 0.32) tryAttack(cpu, Math.random() < cfg.kickBias ? 'kick' : 'punch');
  else if (r < 0.46) tryThrow(cpu);
  else if (r < 0.6) backstep(cpu);
  else if (r < 0.72) axisShift(cpu, Math.random() < 0.5 ? -1 : 1);
}

/* =========================================================
   Online: P2P via WebRTC (PeerJS + the free public 0.peerjs.com
   signaling broker). The host runs the whole simulation and is
   authoritative; the guest only sends its inputs and renders the
   snapshots it receives — a thin client, not full rollback
   netcode, so the guest sees host-RTT worth of extra latency.
   ========================================================= */
const ROOM_EXPIRY_MS = 180000; // 3 minutes — abandoned (no player2 yet) rooms auto-close
const MAX_SPECTATORS = 4;

const Net = {
  peer:null, conn:null, isOnline:false, isHost:false, isGuest:false, isSpectator:false,
  guestConn:null, spectatorConns:[], expiryTimer:null,
  remoteInput:{ left:false, right:false, up:false, down:false },
};

function netSend(obj){
  if (Net.isHost){
    if (Net.guestConn && Net.guestConn.open) Net.guestConn.send(obj);
    Net.spectatorConns.forEach(c => { if (c.open) c.send(obj); });
  } else if (Net.conn && Net.conn.open){
    Net.conn.send(obj);
  }
}

function generateRoomCode(){
  return String(Math.floor(100000 + Math.random() * 900000)); // 6 digits
}

function relabelHudForOnline(){
  const leftName = document.querySelector('#hud .hpRow:not(.right) .name');
  const rightName = document.querySelector('#hud .hpRow.right .name');
  if (Net.isSpectator){ leftName.textContent = 'P1'; rightName.textContent = 'P2'; }
  else if (Net.isHost){ leftName.textContent = 'YOU'; rightName.textContent = 'OPPONENT'; }
  else { leftName.textContent = 'OPPONENT'; rightName.textContent = 'YOU'; }
}

function updateHostStatusText(){
  const base = Net.guestConn ? '接続しました！' : '相手の接続を待っています…';
  const spec = ` / 観戦者 ${Net.spectatorConns.length}/${MAX_SPECTATORS}`;
  document.getElementById('hostStatus').textContent = base + spec;
}

function netCreateRoom(attempt){
  attempt = attempt || 0;
  document.getElementById('hostStatus').textContent = '接続準備中…';
  const peer = new Peer(generateRoomCode());
  Net.peer = peer;

  peer.on('open', id => {
    document.getElementById('hostIdText').textContent = id;
    document.getElementById('hostIdBox').classList.remove('hide');
    updateHostStatusText();
    Net.expiryTimer = setTimeout(() => {
      if (!Net.guestConn) netDisbandRoom('timeout');
    }, ROOM_EXPIRY_MS);
  });

  peer.on('connection', conn => {
    if (!Net.guestConn){
      Net.guestConn = conn; Net.isOnline = true; Net.isHost = true;
      if (Net.expiryTimer){ clearTimeout(Net.expiryTimer); Net.expiryTimer = null; }
      conn.on('open', () => {
        conn.send({ t:'role', role:'player2' });
        updateHostStatusText();
        relabelHudForOnline();
        setTimeout(() => {
          document.getElementById('onlinePanel').classList.add('hide');
          document.getElementById('stageSelect').classList.remove('hide');
        }, 500);
      });
      conn.on('data', msg => hostHandleMessage(msg, conn));
      conn.on('close', () => { Net.guestConn = null; netDisbandRoom('guestLeft'); });
    } else if (Net.spectatorConns.length < MAX_SPECTATORS){
      conn.on('open', () => {
        Net.spectatorConns.push(conn);
        conn.send({ t:'role', role:'spectator' });
        updateHostStatusText();
      });
      conn.on('data', msg => hostHandleMessage(msg, conn));
      conn.on('close', () => {
        Net.spectatorConns = Net.spectatorConns.filter(c => c !== conn);
        updateHostStatusText();
      });
    } else {
      conn.on('open', () => {
        conn.send({ t:'full' });
        setTimeout(() => conn.close(), 300);
      });
    }
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id' && attempt < 5){ netCreateRoom(attempt + 1); return; }
    document.getElementById('hostStatus').textContent = '接続エラー: ' + err.type;
  });
}

function netJoinRoom(hostId){
  document.getElementById('joinStatus').textContent = '接続中…';
  Net.peer = new Peer();
  Net.peer.on('open', () => {
    const conn = Net.peer.connect(hostId, { reliable:true });
    Net.conn = conn; Net.isOnline = true; Net.isGuest = true;
    conn.on('open', () => {
      document.getElementById('joinStatus').textContent = '接続しました！役割を確認中…';
    });
    conn.on('data', guestHandleMessage);
    conn.on('close', netHandleDisconnect);
  });
  Net.peer.on('error', err => {
    document.getElementById('joinStatus').textContent = '接続エラー: ' + err.type;
  });
}

// Full teardown used for an explicit disband, the 3-minute abandoned-room
// timeout, the guest leaving, or backing out of the online menu — always
// notifies whoever is still connected before closing everything.
function netDisbandRoom(reason){
  netSend({ t:'roomClosed', reason });
  if (Net.guestConn) Net.guestConn.close();
  Net.spectatorConns.forEach(c => c.close());
  Net.spectatorConns = [];
  Net.guestConn = null;
  if (Net.conn) Net.conn.close();
  Net.conn = null;
  if (Net.expiryTimer){ clearTimeout(Net.expiryTimer); Net.expiryTimer = null; }
  if (Net.peer){ Net.peer.destroy(); Net.peer = null; }
  Net.isOnline = false; Net.isHost = false; Net.isGuest = false; Net.isSpectator = false;

  document.getElementById('stageSelect').classList.add('hide');
  document.getElementById('waitHostPanel').classList.add('hide');
  document.getElementById('onlinePanel').classList.add('hide');
  document.getElementById('hostIdBox').classList.add('hide');
  document.getElementById('hostIdText').textContent = '-----';
  document.getElementById('controls').style.display = '';
  document.getElementById('modeSelect').classList.remove('hide');
  if (reason === 'timeout') flashCenterText('ルームの有効期限が切れました', '', 2500);
}

addEventListener('pagehide', () => {
  if (!Net.peer) return;
  try { netSend({ t:'roomClosed', reason:'left' }); } catch(e){}
  Net.peer.destroy();
});

function netHandleDisconnect(){
  if (!Net.isOnline) return;
  Net.isOnline = false;
  flashCenterText('切断されました', '', 2500);
}

function serializeFighter(f){
  return {
    hp:f.hp, wins:f.wins, state:f.state, attackType:f.attackType, comboStage:f.comboStage,
    attackStart:f.attackStart, attackResolved:f.attackResolved,
    isDashAttack:f.isDashAttack, guard:f.guard,
    hitstunUntil:f.hitstunUntil, downType:f.downType,
    downStart: f.downStart != null ? f.downStart : null,
    thrownDownStart: f.thrownDownStart != null ? f.thrownDownStart : null,
    knockdownStart: f.knockdownStart != null ? f.knockdownStart : null,
    throwInfo: f.throwInfo ? { ...f.throwInfo } : null,
    flashUntil:f.flashUntil,
    x:f.mesh.position.x, z:f.mesh.position.z,
  };
}
function applyFighterSnapshot(f, snap, offset){
  f.hp = snap.hp; f.wins = snap.wins; f.state = snap.state; f.attackType = snap.attackType;
  f.comboStage = snap.comboStage;
  f.attackStart = snap.attackStart + offset;
  f.attackResolved = snap.attackResolved;
  f.isDashAttack = snap.isDashAttack;
  f.guard = snap.guard;
  f.hitstunUntil = snap.hitstunUntil + offset;
  f.downType = snap.downType;
  f.downStart = snap.downStart != null ? snap.downStart + offset : null;
  f.thrownDownStart = snap.thrownDownStart != null ? snap.thrownDownStart + offset : null;
  f.knockdownStart = snap.knockdownStart != null ? snap.knockdownStart + offset : null;
  f.throwInfo = snap.throwInfo ? { ...snap.throwInfo, start: snap.throwInfo.start + offset } : null;
  f.flashUntil = snap.flashUntil + offset;
  f.netTargetX = snap.x; f.netTargetZ = snap.z;
}

let lastBroadcast = 0;
function netBroadcastState(){
  const now = performance.now();
  if (now - lastBroadcast < 33) return; // ~30Hz
  lastBroadcast = now;
  netSend({
    t:'state', now, matchState, roundNumber,
    p: serializeFighter(player), c: serializeFighter(cpu),
  });
}

function hostHandleMessage(msg, conn){
  if (msg.t !== 'input') return;
  if (conn !== Net.guestConn) return; // spectators can't act — only the designated player2 can
  switch(msg.action){
    case 'punch': tryAttack(cpu, 'punch'); break;
    case 'kick': tryAttack(cpu, 'kick'); break;
    case 'throw': tryThrow(cpu); break;
    case 'guardOn': if (cpu.state === 'idle') cpu.guard = true; break;
    case 'guardOff': cpu.guard = false; break;
    case 'doubleTap': handleDoubleTap(cpu, msg.dir); break;
    case 'moveHold': Net.remoteInput[msg.dir] = msg.held; break;
  }
}

function guestHandleMessage(msg){
  if (msg.t === 'state'){
    const offset = performance.now() - msg.now;
    matchState = msg.matchState;
    roundNumber = msg.roundNumber;
    applyFighterSnapshot(player, msg.p, offset);
    applyFighterSnapshot(cpu, msg.c, offset);
    updateHpUI(); updatePipsUI();
  } else if (msg.t === 'ev'){
    if (msg.name === 'centerText') flashCenterText(msg.big, msg.small, msg.ms);
    else if (msg.name === 'sfx') SFX[msg.sfx]();
    else if (msg.name === 'shake') shake(msg.mag, msg.ms);
    else if (msg.name === 'flashHit') flashHit(msg.who === 'p' ? player : cpu);
  } else if (msg.t === 'stageChosen'){
    STAGE_DEFS[msg.stage].build(stageGroup);
    document.getElementById('waitHostPanel').classList.add('hide');
    tick();
  } else if (msg.t === 'role'){
    Net.isSpectator = msg.role === 'spectator';
    relabelHudForOnline();
    document.getElementById('joinStatus').textContent = Net.isSpectator ? '観戦者として接続しました！' : '対戦相手として接続しました！';
    if (Net.isSpectator) document.getElementById('controls').style.display = 'none';
    document.getElementById('onlinePanel').classList.add('hide');
    document.getElementById('waitHostPanel').classList.remove('hide');
  } else if (msg.t === 'full'){
    document.getElementById('joinStatus').textContent = '満員です（観戦者の上限に達しています）';
    if (Net.conn) Net.conn.close();
    if (Net.peer){ Net.peer.destroy(); Net.peer = null; }
    Net.isOnline = false; Net.isGuest = false;
  } else if (msg.t === 'roomClosed'){
    const reasonText = msg.reason === 'timeout' ? 'ルームが期限切れになりました' : 'ルームが解散されました';
    flashCenterText(reasonText, '', 2500);
    if (Net.conn) Net.conn.close();
    if (Net.peer){ Net.peer.destroy(); Net.peer = null; }
    Net.isOnline = false; Net.isGuest = false; Net.isSpectator = false;
    setTimeout(() => {
      document.getElementById('waitHostPanel').classList.add('hide');
      document.getElementById('onlinePanel').classList.add('hide');
      document.getElementById('stageSelect').classList.add('hide');
      document.getElementById('controls').style.display = '';
      document.getElementById('modeSelect').classList.remove('hide');
    }, 1500);
  }
}

/* =========================================================
   Main loop
   ========================================================= */
const clock = new THREE.Clock();

function applyTween(f){
  if (!f.posTween) return;
  const now = performance.now();
  const tw = f.posTween;
  const t = THREE.MathUtils.clamp((now - tw.start)/tw.duration, 0, 1);
  const ease = 1 - Math.pow(1-t, 2);
  f.mesh.position.x = THREE.MathUtils.lerp(tw.fromX, tw.toX, ease);
  f.mesh.position.z = THREE.MathUtils.lerp(tw.fromZ, tw.toZ, ease);
  if (t >= 1) f.posTween = null;
  clampSeparation(f);
}

function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (Net.isGuest){
    // thin client: no local sim — just smoothly follow the host's snapshots
    [player, cpu].forEach(f => {
      if (f.netTargetX != null){
        f.mesh.position.x = THREE.MathUtils.lerp(f.mesh.position.x, f.netTargetX, 0.35);
        f.mesh.position.z = THREE.MathUtils.lerp(f.mesh.position.z, f.netTargetZ, 0.35);
      }
    });
  } else {
    if (matchState === 'fighting'){
      updateWalk(player, input, dt);
      if (Net.isHost) updateWalk(cpu, Net.remoteInput, dt);
      else updateCpuAI();
    }
    [player, cpu].forEach(f => {
      if (f.state === 'attack' && !f.attackResolved){
        const spec = getAttackSpec(f.attackType, f.comboStage);
        if (performance.now() - f.attackStart >= spec.startup) resolveAttackHit(f);
      }
      applyTween(f);
    });
    if (Net.isHost) netBroadcastState();
  }

  [player, cpu].forEach(f => {
    animatePose(f);
    updateFlash(f);
    faceOpponent(f);
  });

  updateCamera();
  renderer.render(scene, camera);
}

document.querySelectorAll('.stageBtn').forEach(btn => {
  let picked = false;
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (picked) return; // guard against a duplicate pointerdown + click firing
    picked = true;
    try { ensureAudio(); SFX.tap(); } catch (err) { console.error('audio init failed:', err); showErrBanner('audio: ' + err.message); }
    try { clearStage(); STAGE_DEFS[btn.dataset.stage].build(stageGroup); }
    catch (err) { console.error('stage build failed:', err); showErrBanner('stage: ' + err.message); }
    document.getElementById('stageSelect').classList.add('hide');
    if (Net.isHost) netSend({ t:'stageChosen', stage: btn.dataset.stage });
    startRound();
    tick();
  });
});

document.getElementById('modeCpuBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  document.getElementById('modeSelect').classList.add('hide');
  document.getElementById('difficultySelect').classList.remove('hide');
});
function pickCpuDifficulty(level){
  cpuDifficulty = level;
  document.getElementById('difficultySelect').classList.add('hide');
  document.getElementById('stageSelect').classList.remove('hide');
}
document.getElementById('diffNoviceBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); pickCpuDifficulty('novice'); });
document.getElementById('diffMasterBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); pickCpuDifficulty('master'); });
document.getElementById('diffExpertBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); pickCpuDifficulty('expert'); });
document.getElementById('difficultyBackBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  document.getElementById('difficultySelect').classList.add('hide');
  document.getElementById('modeSelect').classList.remove('hide');
});
document.getElementById('modeOnlineBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  document.getElementById('modeSelect').classList.add('hide');
  document.getElementById('onlinePanel').classList.remove('hide');
});
document.getElementById('onlineBackBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (Net.peer) netDisbandRoom('cancelled');
  else {
    document.getElementById('onlinePanel').classList.add('hide');
    document.getElementById('modeSelect').classList.remove('hide');
  }
});
document.getElementById('disbandBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  netDisbandRoom('hostClosed');
});
document.getElementById('hostCreateBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  ensureAudio();
  netCreateRoom();
});
document.getElementById('joinBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  ensureAudio();
  const id = document.getElementById('joinIdInput').value.trim();
  if (!id) return;
  netJoinRoom(id);
});
document.getElementById('copyIdBtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const id = document.getElementById('hostIdText').textContent;
  navigator.clipboard?.writeText(id).catch(() => {});
});
</script>
</body>
</html>
