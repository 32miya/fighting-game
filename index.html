/* =========================================================
   Fighter model — 3-piece torso (hips / waist / chest) +
   articulated arms (shoulder→elbow) and legs (hip→knee)
   ========================================================= */
/* Costume presets — purely cosmetic (materials + optional bolted-on decoration).
   None of these touch a single joint offset or limb length, so the combat/pose
   code (which was hand-tuned against the rig's exact geometry) is untouched.
   waist/obi always uses the fighter's own accentColor (P1/P2 color-coding),
   independent of costume, so the two sides stay visually distinguishable
   no matter which costume either of them is wearing. */
// build: multipliers on the base (=1) rig dimensions — leg/arm scale the limb lengths,
// thick scales limb (and hand/foot) radii, torso scales chest/hips/waist width+depth
// (never height, so it never interacts with the leg-length ground-compensation math below).
// gi keeps every factor at 1 so it stays pixel-identical to the original rig.
const COSTUMES = {
  gi: {
    label:'道着ファイター',
    chest:0xf0ebe0, hips:0xf0ebe0, limb:0xf0ebe0,
    skin:0xe8b48c, glove:0xe8b48c, boot:0xe8b48c, extra:null,
    build:{ leg:1.00, arm:1.00, thick:1.00, torso:1.00 },
  },
  wrestler: {
    label:'プロレスラー',
    chest:0x241f1a, hips:0x241f1a, limb:0xe8b48c,
    skin:0xe8b48c, glove:0xe8b48c, boot:0xffffff, extra:null,
    build:{ leg:0.92, arm:1.08, thick:1.30, torso:1.22 }, // stocky powerhouse — short thick legs, big arms/chest
  },
  soldier: {
    label:'ソルジャー',
    chest:0x5c6b3f, hips:0x4a5636, limb:0x5c6b3f,
    skin:0xe8b48c, glove:0x3a2f22, boot:0x2a2a2a, extra:'helmet', extraColor:0x4a5636,
    build:{ leg:1.00, arm:1.00, thick:0.98, torso:1.00 }, // standard athletic build
  },
  mma: {
    label:'総合格闘家',
    chest:0xe8b48c, hips:0x1a1a1a, limb:0xe8b48c,
    skin:0xe8b48c, glove:0x1a1a1a, boot:0xe8b48c, extra:null,
    build:{ leg:1.06, arm:1.03, thick:0.90, torso:0.94 }, // lean and rangy
  },
  hero: {
    label:'ヒーロー',
    chest:0xffd23f, hips:0xffd23f, limb:0xffd23f,
    skin:0xe8b48c, glove:0xffffff, boot:0xffffff, extra:'cape', extraColor:0xff5e3a,
    build:{ leg:1.10, arm:1.05, thick:0.90, torso:0.93 }, // tall, lean, plain-built hero silhouette
  },
};

function buildFighterMesh(costumeKey, color){
  const costume = COSTUMES[costumeKey] || COSTUMES.gi;
  const root = new THREE.Group();
  const base = new THREE.Color(color);
  const beltMat = new THREE.MeshStandardMaterial({ color: base, roughness:0.55 }); // obi — keeps the player/CPU color coding
  const chestMat = new THREE.MeshStandardMaterial({ color: costume.chest, roughness:0.85 });
  const hipsMat = new THREE.MeshStandardMaterial({ color: costume.hips, roughness:0.85 });
  const limbMat = new THREE.MeshStandardMaterial({ color: costume.limb, roughness:0.85 });
  const skinMat = new THREE.MeshStandardMaterial({ color: costume.skin, roughness:0.7 });
  const gloveMat = new THREE.MeshStandardMaterial({ color: costume.glove, roughness:0.7 });
  const bootMat = new THREE.MeshStandardMaterial({ color: costume.boot, roughness:0.6 });
  const hitMeshes = [];

  // Base (scale=1) dimensions — identical to the original fixed numbers, so a build of
  // all-1.0 factors (the `gi` costume) reproduces the rig exactly as before.
  const build = costume.build || { leg:1, arm:1, thick:1, torso:1 };
  const BASE_THIGH_LEN=0.30, BASE_THIGH_R=0.105, BASE_SHIN_LEN=0.30, BASE_SHIN_R=0.088;
  const BASE_UPPER_LEN=0.24, BASE_UPPER_R=0.078, BASE_FORE_LEN=0.24, BASE_FORE_R=0.066;

  const thighLen = BASE_THIGH_LEN * build.leg, thighR = BASE_THIGH_R * build.thick;
  const shinLen = BASE_SHIN_LEN * build.leg, shinR = BASE_SHIN_R * build.thick;
  const upperLen = BASE_UPPER_LEN * build.arm, upperR = BASE_UPPER_R * build.thick;
  const foreLen = BASE_FORE_LEN * build.arm, foreR = BASE_FORE_R * build.thick;

  // Longer/shorter legs must shift the whole upper body (hips+waist+chest, and everything
  // that hangs off chest) up or down by the same amount the leg chain grew or shrank —
  // otherwise taller/shorter legs would leave the feet floating above or sunk into the floor.
  const defaultLegDrop = (BASE_THIGH_LEN + BASE_THIGH_R*2) + (BASE_SHIN_LEN + BASE_SHIN_R*2);
  const legDrop = (thighLen + thighR*2) + (shinLen + shinR*2);
  const torsoYDelta = legDrop - defaultLegDrop;

  // ---- 腰下 (hips / pelvis) ----
  const hips = new THREE.Group();
  hips.position.set(0, 0.92 + torsoYDelta, 0);
  root.add(hips);
  const hipsMesh = new THREE.Mesh(new THREE.BoxGeometry(0.44 * build.torso, 0.24, 0.30 * build.torso), hipsMat);
  hipsMesh.castShadow = true;
  hips.add(hipsMesh);
  hitMeshes.push(hipsMesh);

  // ---- ウエスト (waist) — doubles as the obi/belt ----
  const waist = new THREE.Group();
  waist.position.set(0, 1.12 + torsoYDelta, 0);
  root.add(waist);
  const waistMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.19 * build.torso, 0.09, 4, 8), beltMat);
  waistMesh.castShadow = true;
  waist.add(waistMesh);
  hitMeshes.push(waistMesh);

  // ---- バスト (chest) — also the upper-body lean pivot ----
  const chest = new THREE.Group();
  chest.position.set(0, 1.28 + torsoYDelta, 0);
  root.add(chest);
  const chestMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.27 * build.torso, 0.26, 4, 8), chestMat);
  chestMesh.position.y = 0.23;
  chestMesh.castShadow = true;
  chest.add(chestMesh);
  hitMeshes.push(chestMesh);

  // ---- 首 (neck) — its own pivot so the head can snap/tuck/turn independently of the
  // chest lean, instead of riding along rigidly as a fixed child of it ----
  const neck = new THREE.Group();
  neck.position.set(0, 0.5, 0);
  chest.add(neck);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.23, 16, 16), skinMat);
  head.position.set(0, 0.12, 0); // 0.5 + 0.12 = 0.62, same world offset as before the neck pivot existed
  head.castShadow = true;
  neck.add(head);

  if (costume.extra === 'helmet'){
    const helmetMat = new THREE.MeshStandardMaterial({ color: costume.extraColor, roughness:0.5 });
    const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.25, 14, 10, 0, Math.PI*2, 0, Math.PI*0.6), helmetMat);
    helmet.position.set(0, 0.16, 0); // follows the head off the neck pivot now
    helmet.castShadow = true;
    neck.add(helmet);
  } else if (costume.extra === 'cape'){
    const capeMat = new THREE.MeshStandardMaterial({ color: costume.extraColor, roughness:0.8, side: THREE.DoubleSide });
    const cape = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.5, 0.025), capeMat);
    cape.position.set(0, -0.05, -0.17); // -Z = behind (away from the opponent), hangs from the shoulders
    cape.castShadow = true;
    chest.add(cape);
  }

  // ---- Arms: 肩(shoulder) → 肘(elbow) ----
  function buildArm(side){
    const shoulder = new THREE.Group();
    shoulder.position.set(side * 0.33 * build.torso, 0.32, 0); // shoulders ride outward with a wider/narrower chest
    chest.add(shoulder);

    const upperArm = new THREE.Mesh(new THREE.CapsuleGeometry(upperR, upperLen, 4, 8), limbMat);
    upperArm.position.y = -(upperLen/2 + upperR);
    upperArm.castShadow = true;
    shoulder.add(upperArm);
    hitMeshes.push(upperArm);

    const elbow = new THREE.Group();
    elbow.position.y = -(upperLen + upperR*2);
    shoulder.add(elbow);

    const forearm = new THREE.Mesh(new THREE.CapsuleGeometry(foreR, foreLen, 4, 8), limbMat);
    forearm.position.y = -(foreLen/2 + foreR);
    forearm.castShadow = true;
    elbow.add(forearm);

    const fist = new THREE.Mesh(new THREE.SphereGeometry(0.088 * build.thick, 12, 12), gloveMat);
    fist.position.y = -(foreLen + foreR*2);
    fist.castShadow = true;
    elbow.add(fist);

    return { shoulder, elbow };
  }
  const armL = buildArm(-1);
  const armR = buildArm(1);

  // ---- Legs: 股関節(hip) → 膝(knee) ----
  function buildLeg(side, zOffset){
    const hip = new THREE.Group();
    hip.position.set(side * 0.22 * build.torso, -0.10, zOffset); // stance widens with bulkier hips
    hips.add(hip);

    const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(thighR, thighLen, 4, 8), limbMat);
    thigh.position.y = -(thighLen/2 + thighR);
    thigh.castShadow = true;
    hip.add(thigh);
    hitMeshes.push(thigh);

    const knee = new THREE.Group();
    knee.position.y = -(thighLen + thighR*2);
    hip.add(knee);

    const shin = new THREE.Mesh(new THREE.CapsuleGeometry(shinR, shinLen, 4, 8), limbMat);
    shin.position.y = -(shinLen/2 + shinR);
    shin.castShadow = true;
    knee.add(shin);

    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.14 * build.thick, 0.08, 0.24 * build.thick), bootMat);
    foot.position.set(0, -(shinLen + shinR*2), 0.05);
    foot.castShadow = true;
    knee.add(foot);

    return { hip, knee };
  }
  // legR leads the stance (offset toward +Z, toward the opponent — "front"), legL trails ("back")
  const legL = buildLeg(-1, -0.17);
  const legR = buildLeg(1, 0.17);

  root.userData.limbs = { hips, waist, chest, neck, head, armL, armR, legL, legR, hitMeshes };
  return root;
}

/* Fighting-stance base pose (constantly blended toward during idle/guard/movement).
   faceOpponent()'s lookAt points local +Z at the opponent, so +X rotation on a limb
   pivot swings it toward local -Z (away/back); -X swings it toward +Z (toward the
   opponent/front). legR sits structurally forward (built with a +Z offset), legL back.
   chestLeanX is the OPPOSITE sign convention: the chest/head sit above their pivot
   (not hanging below it like limbs), so +X leans the chest/head toward +Z (forward).
   For the guard, shoulderX is +(elbow tucked back/away from the opponent) and elbowX
   is - enough to fold the forearm back past it, so the fist ends up forward again. */
const STANCE = {
  chestLeanX: 0.24,
  frontHipX: -0.32, frontKneeX: 0.8,
  backHipX: -0.14, backKneeX: 1.05,
  shoulderX: -Math.PI/2, shoulderZ: 0.24, elbowX: -(80 * Math.PI/180),
};

const ARENA_X = 4.3, ARENA_Z = 1.6, MIN_GAP = 0.95;

class Fighter{
  constructor(name, color, x, isCPU, costume){
    this.name = name;
    this.isCPU = isCPU;
    this.costume = costume || 'gi';
    this.mesh = buildFighterMesh(this.costume, color);
    this.mesh.position.set(x, 0, 0);
    scene.add(this.mesh);

    this.hp = 100; this.maxHp = 100; this.wins = 0;
    this.state = 'idle'; // idle | attack | throw | thrown | hitstun | down | knockdown
    this.attackType = null;
    this.attackStart = 0;
    this.attackResolved = true;
    this.isDashAttack = false;
    this.dashBuffUntil = 0;
    this.guard = false;
    this.guardReleaseAt = Infinity;
    this.lastAttack = { type:null, stage:0, time:-9999 };
    this.comboStage = 0;       // 1/2/3 = which hit of the current punch/kick string
    this.comboExpireAt = 0;    // pressing the same button again before this time continues the combo
    this.queuedAction = null;  // buffered next-hit input pressed while mid-attack
    this.comboDecided = true;  // CPU-only: has this attack's combo-continue roll already happened
    this.confirmedCombo = 0;   // count of hits that actually LANDED in the current string (not just presses)
    this.knockdownStart = 0;
    this.victoryStart = 0;
    this.specialGauge = 0;    // 0-100 — fills as damage is dealt/taken, spends fully on trySpecial()
    this.specialStart = 0;
    this.posTween = null;      // {fromX,fromZ,toX,toZ,start,duration}
    this.throwInfo = null;     // active throw animation data
    this.hitstunUntil = 0;
    this.nextDecision = 0;     // CPU think timer
    this.flashUntil = 0;
    this.baseColor = color;
    this.downType = null;
    this.bobPhase = Math.random() * Math.PI * 2;
  }
}

const player = new Fighter('PLAYER', 0x3fa9ff, -1.6, false);
const cpu    = new Fighter('CPU',    0xff4d4d,  1.6, true);
function other(f){ return f === player ? cpu : player; }

// Swaps a fighter's mesh for a different costume, preserving its current position.
// Meshes are cheap (a couple dozen primitives), so a full rebuild — rather than trying
// to re-material an existing mesh in place — keeps buildFighterMesh() the single source
// of truth and avoids any risk of missing a part when a new costume adds decoration.
function rebuildFighterMesh(f, costumeKey){
  const x = f.mesh.position.x, z = f.mesh.position.z;
  scene.remove(f.mesh);
  f.costume = costumeKey;
  f.mesh = buildFighterMesh(costumeKey, f.baseColor);
  f.mesh.position.set(x, 0, z);
  scene.add(f.mesh);
}

/* =========================================================
   Camera framing — keeps both fighters in view, look-at midpoint
   ========================================================= */
function updateCamera(){
  const p1 = player.mesh.position, p2 = cpu.mesh.position;
  const midX = (p1.x + p2.x) / 2;
  const midZ = (p1.z + p2.z) / 2;

  const halfSpanNeeded = Math.abs(p1.x - p2.x) / 2 + 1.3;
  const hFovHalf = Math.atan(Math.tan(THREE.MathUtils.degToRad(camera.fov)/2) * camera.aspect);
  const neededDist = halfSpanNeeded / Math.tan(hFovHalf);
  const camDist = THREE.MathUtils.clamp(neededDist + 1.8, 4.2, 10);
  const camHeight = 1.55 + camDist * 0.1;

  let shakeX = 0, shakeY = 0;
  const now = performance.now();
  if (now < shakeUntil){
    shakeX = (Math.random()-0.5) * shakeMag;
    shakeY = (Math.random()-0.5) * shakeMag;
  }

  camera.position.set(midX + shakeX, camHeight + shakeY, midZ + camDist);
  camera.lookAt(midX, 1.15, midZ);
}
let shakeUntil = 0, shakeMag = 0;
function shake(mag, ms){
  shakeUntil = performance.now() + ms; shakeMag = mag;
  if (Net.isHost) netSend({ t:'ev', name:'shake', mag, ms });
}

// Hit-stop: rather than threading a pause through every wall-clock timestamp the game already
// uses (attackStart, specialStart, hitstunUntil, throwInfo.start, …), we just hold the very last
// rendered frame for a beat — tick() keeps running (so the freeze ends on time) but skips the
// render call. Simulation quietly keeps advancing behind the frozen frame, which is imperceptible
// for the short durations this is used for (~100-200ms).
let renderFreezeUntil = 0;
function triggerHitStop(ms, skipBroadcast){
  renderFreezeUntil = Math.max(renderFreezeUntil, performance.now() + ms);
  if (Net.isHost && !skipBroadcast) netSend({ t:'ev', name:'hitstop', ms });
}

const impactFlashEl = document.getElementById('impactFlash');
function flashImpact(color, ms, skipBroadcast){
  impactFlashEl.style.background = color;
  impactFlashEl.style.setProperty('--flash-ms', ms + 'ms');
  impactFlashEl.classList.remove('show'); void impactFlashEl.offsetWidth; impactFlashEl.classList.add('show');
  if (Net.isHost && !skipBroadcast) netSend({ t:'ev', name:'impactFlash', color, ms });
}

const specialCalloutEl = document.getElementById('specialCallout');
let specialCalloutTimer = null;
function flashImpactCallout(text, color, skipBroadcast){
  clearTimeout(specialCalloutTimer);
  specialCalloutEl.textContent = text;
  specialCalloutEl.style.color = color;
  specialCalloutEl.classList.remove('show'); void specialCalloutEl.offsetWidth; specialCalloutEl.classList.add('show');
  specialCalloutTimer = setTimeout(() => specialCalloutEl.classList.remove('show'), 900);
  if (Net.isHost && !skipBroadcast) netSend({ t:'ev', name:'specialCallout', text, color });
}

// The three effects above are usually triggered together for a landed special/counter/K.O.
function showSpecialHitEffect(moveName){
  triggerHitStop(100);
  flashImpact('#ffd23f', 180);
  flashImpactCallout(moveName, '#ffd23f');
}

// Projects a world position to CSS pixel coordinates against the current camera/canvas —
// used so "HIT!"/"GUARD" popups can appear right where the blow actually landed, rather than
// a fixed screen position, which is far easier to read at a glance than the full-screen flash.
function screenPositionFor(worldPos){
  const p = worldPos.clone().project(camera);
  const rect = renderer.domElement.getBoundingClientRect();
  return {
    x: rect.left + (p.x * 0.5 + 0.5) * rect.width,
    y: rect.top + (-p.y * 0.5 + 0.5) * rect.height,
  };
}

const hitPopupLayerEl = document.getElementById('hitPopupLayer');
function spawnHitPopup(f, text, color, skipBroadcast){
  const worldPos = new THREE.Vector3(f.mesh.position.x, f.mesh.position.y + 1.35, f.mesh.position.z);
  const { x, y } = screenPositionFor(worldPos);
  const el = document.createElement('div');
  el.className = 'hitPopup';
  el.style.setProperty('--pop-color', color);
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.innerHTML = '<div class="burst"></div><div class="label"></div>';
  el.querySelector('.label').textContent = text;
  el.addEventListener('animationend', () => el.remove());
  hitPopupLayerEl.appendChild(el);
  if (Net.isHost && !skipBroadcast) netSend({ t:'ev', name:'hitPopup', who: f === player ? 'p' : 'c', text, color });
}

function faceOpponent(f){
  // 'special' is skipped too: mesh.lookAt() fully overwrites the root rotation every frame,
  // which would fight with (and instantly erase) the soldier's backflip rotation.x animation.
  if (f.state === 'thrown' || f.state === 'down' || f.state === 'thrownDown' || f.state === 'knockdown' || f.state === 'special') return;
  const o = other(f);
  // keep target at the fighter's own height so this is a pure yaw (turn to face),
  // never a pitch — otherwise the whole body tips forward/back like a falling pole.
  const target = new THREE.Vector3(o.mesh.position.x, f.mesh.position.y, o.mesh.position.z);
  f.mesh.lookAt(target);
}

/* =========================================================
   Movement helpers
   ========================================================= */
function tweenPos(f, toX, toZ, duration){
  toX = THREE.MathUtils.clamp(toX, -ARENA_X, ARENA_X);
  toZ = THREE.MathUtils.clamp(toZ, -ARENA_Z, ARENA_Z);
  f.posTween = { fromX:f.mesh.position.x, fromZ:f.mesh.position.z, toX, toZ, start:performance.now(), duration };
}

function dashIn(f){
  if (f.state !== 'idle') return;
  const o = other(f);
  const dir = f.mesh.position.x <= o.mesh.position.x ? 1 : -1;
  let toX = f.mesh.position.x + dir * 1.25;
  toX = dir > 0 ? Math.min(toX, o.mesh.position.x - MIN_GAP) : Math.max(toX, o.mesh.position.x + MIN_GAP);
  tweenPos(f, toX, f.mesh.position.z, 130);
  f.dashBuffUntil = performance.now() + 500;
}

function backstep(f){
  if (f.state !== 'idle') return;
  const o = other(f);
  const dir = f.mesh.position.x <= o.mesh.position.x ? -1 : 1;
  const toX = f.mesh.position.x + dir * 1.25;
  tweenPos(f, toX, f.mesh.position.z, 130);
}

function axisShift(f, sign){
  if (f.state !== 'idle') return;
  const toZ = f.mesh.position.z + sign * 1.3;
  tweenPos(f, f.mesh.position.x, toZ, 150);
}

function clampSeparation(mover){
  const o = other(mover);
  if (Math.abs(mover.mesh.position.x - o.mesh.position.x) < MIN_GAP){
    if (mover.mesh.position.x < o.mesh.position.x) mover.mesh.position.x = o.mesh.position.x - MIN_GAP;
    else mover.mesh.position.x = o.mesh.position.x + MIN_GAP;
  }
}

/* =========================================================
   SFX — synthesized via Web Audio API, no audio assets needed
   ========================================================= */
let actx = null;
function ensureAudio(){
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function noiseBuffer(ctx, duration){
  const rate = ctx.sampleRate;
  const buffer = ctx.createBuffer(1, Math.max(1, Math.round(rate*duration)), rate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random()*2 - 1;
  return buffer;
}

function playNoise(ctx, { duration=0.15, filterFreq=1200, filterType='bandpass', gain=0.5 }){
  const src = ctx.createBufferSource();
  src.buffer = noiseBuffer(ctx, duration);
  const filter = ctx.createBiquadFilter();
  filter.type = filterType; filter.frequency.value = filterFreq;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  src.connect(filter); filter.connect(g); g.connect(ctx.destination);
  src.start();
  src.stop(ctx.currentTime + duration + 0.02);
}

function playTone(ctx, { freq=440, type='sine', duration=0.15, gain=0.3, freqEnd=null, delay=0 }){
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  osc.type = type; osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + duration);
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + duration + 0.02);
}

const SFX = {
  punch(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.04, filterFreq:2800, filterType:'highpass', gain:0.2 }); // brief crack
    playNoise(ctx, { duration:0.16, filterFreq:450, filterType:'lowpass', gain:0.55 }); // meaty body
    playTone(ctx, { freq:110, type:'sine', duration:0.2, gain:0.7, freqEnd:35 }); // low thump
  },
  kick(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.05, filterFreq:2200, filterType:'highpass', gain:0.2 });
    playNoise(ctx, { duration:0.22, filterFreq:320, filterType:'lowpass', gain:0.6 });
    playTone(ctx, { freq:80, type:'sine', duration:0.26, gain:0.75, freqEnd:28 });
  },
  guard(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.05, filterFreq:2600, filterType:'highpass', gain:0.35 });
    playTone(ctx, { freq:520, type:'square', duration:0.05, gain:0.2 });
  },
  miss(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.18, filterFreq:2000, filterType:'bandpass', gain:0.16 });
  },
  throwHit(){ const ctx = ensureAudio();
    playNoise(ctx, { duration:0.22, filterFreq:500, filterType:'lowpass', gain:0.6 });
    playTone(ctx, { freq:90, type:'sine', duration:0.28, gain:0.6, freqEnd:35 });
  },
  heavyHit(){ const ctx = ensureAudio(); // combo finisher impact — uppercut knockdown / sobat knockback
    playNoise(ctx, { duration:0.06, filterFreq:2500, filterType:'highpass', gain:0.25 });
    playNoise(ctx, { duration:0.28, filterFreq:280, filterType:'lowpass', gain:0.7 });
    playTone(ctx, { freq:70, type:'sine', duration:0.34, gain:0.8, freqEnd:24 });
  },
  bell(){ const ctx = ensureAudio();
    playTone(ctx, { freq:880, type:'sine', duration:0.5, gain:0.35 });
    playTone(ctx, { freq:1320, type:'sine', duration:0.4, gain:0.2, delay:0.02 });
  },
  ko(){ const ctx = ensureAudio();
    [660, 550, 440, 330].forEach((f, i) => playTone(ctx, { freq:f, type:'sawtooth', duration:0.22, gain:0.3, delay:i*0.09 }));
  },
  win(){ const ctx = ensureAudio();
    [440, 554, 659, 880].forEach((f, i) => playTone(ctx, { freq:f, type:'triangle', duration:0.28, gain:0.3, delay:i*0.12 }));
  },
  tap(){ const ctx = ensureAudio();
    playTone(ctx, { freq:700, type:'square', duration:0.03, gain:0.12 });
  },
};
// broadcast every SFX call (except the local-only button tap) to the guest when hosting online
Object.keys(SFX).forEach(name => {
  if (name === 'tap') return;
  const original = SFX[name];
  SFX[name] = function(...args){
    original.apply(SFX, args);
    if (Net.isHost) netSend({ t:'ev', name:'sfx', sfx:name });
  };
});

/* =========================================================
   Combat: attacks
   ========================================================= */
// Per-combo-stage specs. Stage 1 of each is byte-for-byte the original single punch/kick.
const PUNCH_SPECS = [ null,
  { startup:130, active:90,  recovery:220, dmg:8,  reach:1.55 },                    // 1: jab (unchanged)
  { startup:110, active:80,  recovery:200, dmg:9,  reach:1.55 },                    // 2: cross (one-two)
  { startup:150, active:100, recovery:320, dmg:14, reach:1.5,  knockdown:true },    // 3: uppercut
];
const KICK_SPECS = [ null,
  { startup:190, active:100, recovery:300, dmg:12, reach:1.85 },                    // 1: body roundhouse (unchanged)
  { startup:175, active:100, recovery:290, dmg:13, reach:1.85 },                    // 2: head kick
  { startup:230, active:110, recovery:360, dmg:16, reach:1.9,  knockback:2 },       // 3: rolling sobat
];
function getAttackSpec(type, stage){
  const table = type === 'kick' ? KICK_SPECS : PUNCH_SPECS;
  return table[stage] || table[1];
}

const COMBO_BUFFER_MS = 550; // window after a hit's recovery ends during which the same button continues the string
const KNOCKBACK_STEP = 0.9;

// Special-move gauge: fills from damage dealt (fast) and damage taken (slower, so a losing
// side still has a comeback option) — capped at 100, spent in full by trySpecial().
const SPECIAL_GAUGE_MAX = 100;
const GAUGE_GAIN_ATTACKER = 1.6;
const GAUGE_GAIN_DEFENDER = 0.8;
function gainSpecialGauge(attacker, defender, dmg){
  attacker.specialGauge = Math.min(SPECIAL_GAUGE_MAX, attacker.specialGauge + dmg * GAUGE_GAIN_ATTACKER);
  defender.specialGauge = Math.min(SPECIAL_GAUGE_MAX, defender.specialGauge + dmg * GAUGE_GAIN_DEFENDER);
}

function startAttackStage(f, type, stage, now){
  const spec = getAttackSpec(type, stage);
  f.state = 'attack';
  f.attackType = type;
  f.comboStage = stage;
  f.attackStart = now;
  f.attackResolved = false;
  f.queuedAction = null;
  f.comboDecided = false;
  if (stage === 1) f.confirmedCombo = 0; // a fresh string from neutral resets the landed-hit count
  f.isDashAttack = now < f.dashBuffUntil;
  f.dashBuffUntil = 0;
  f.lastAttack = { type, stage, time:now };
  f.comboExpireAt = now + spec.startup + spec.active + spec.recovery + COMBO_BUFFER_MS;
}

function tryAttack(f, type){
  if (f.guard) return;
  const now = performance.now();
  if (f.state === 'attack'){
    // buffer the next hit of the same string; consumed once the current hit's animation finishes
    if (f.attackType === type && !f.queuedAction && f.comboStage < 3) f.queuedAction = type;
    return;
  }
  if (f.state !== 'idle') return;
  const stage = (f.attackType === type && now < f.comboExpireAt && f.comboStage < 3) ? f.comboStage + 1 : 1;
  startAttackStage(f, type, stage, now);
}

function resolveAttackHit(attacker){
  if (attacker.attackResolved) return;
  attacker.attackResolved = true;
  const defender = other(attacker);
  if (defender.state === 'down') return;

  const spec = getAttackSpec(attacker.attackType, attacker.comboStage);
  const dx = Math.abs(attacker.mesh.position.x - defender.mesh.position.x);
  const dz = Math.abs(attacker.mesh.position.z - defender.mesh.position.z);

  if (dx > spec.reach || dz > 0.75 || defender.state === 'thrown' || defender.state === 'thrownDown' || defender.state === 'knockdown'){
    flashCenterText('MISS', '', 500);
    SFX.miss();
    return; // evaded via axis-shift / backstep / range
  }

  let dmg = spec.dmg * (attacker.isDashAttack ? 1.5 : 1);

  if (defender.guard){
    dmg *= 0.3;
    shake(0.04, 100);
    SFX.guard();
    spawnHitPopup(defender, 'GUARD', '#4da6ff');
  } else if (spec.knockdown){
    shake(0.14, 220);
    SFX.heavyHit();
    defender.state = 'knockdown';
    defender.knockdownStart = now2();
    spawnHitPopup(defender, 'HIT!', '#ff5e3a');
  } else if (spec.knockback){
    shake(0.14, 220);
    SFX.heavyHit();
    const dir = Math.sign(defender.mesh.position.x - attacker.mesh.position.x) || 1;
    tweenPos(defender, defender.mesh.position.x + dir * spec.knockback * KNOCKBACK_STEP, defender.mesh.position.z, 260);
    defender.state = 'hitstun';
    defender.hitstunUntil = now2() + 420;
    spawnHitPopup(defender, 'HIT!', '#ff5e3a');
  } else {
    defender.state = 'hitstun';
    defender.hitstunUntil = now2() + 260;
    shake(0.09, 150);
    attacker.attackType === 'kick' ? SFX.kick() : SFX.punch();
    spawnHitPopup(defender, 'HIT!', '#ff5e3a');
  }
  if (!defender.guard){
    attacker.confirmedCombo++;
    if (attacker.confirmedCombo >= 2) showComboCounter(attacker.confirmedCombo);
  }
  gainSpecialGauge(attacker, defender, dmg);
  flashHit(defender);
  applyDamage(defender, dmg, attacker.attackType);
}

function now2(){ return performance.now(); }

/* =========================================================
   Combat: special moves (per-costume "ultimate" — spends a full
   gauge, one unique move per character). Strike-type specials
   (gi/soldier/mma/hero) run through the 'special' state, resolved
   the same way normal attacks are; the wrestler's is a guaranteed
   grab and reuses the throw state machinery directly.
   ========================================================= */
const SPECIAL_SPECS = {
  gi:      { startup:650, active:120, recovery:260, dmg:36, reach:1.6, knockdown:true },
  soldier: { startup:520, active:140, recovery:300, dmg:34, reach:1.9, knockdown:true },
  mma:     { startup:420, active:130, recovery:280, dmg:36, reach:2.0, knockdown:true },
  hero:    { startup:700, active:130, recovery:280, dmg:45, reach:1.6, knockdown:true },
  // grab-type — same windup/resolve pattern as the strikes (needed so it can be counter-timed
  // the same way), but at resolution it either executes a guaranteed throw or whiffs, instead
  // of dealing damage directly like the strikes do
  wrestler:{ startup:450, active:1, recovery:280, dmg:40, reach:1.5, isGrab:true },
};
const SPECIAL_MOVE_NAMES = {
  gi:'崩拳・極み', soldier:'宙返り蹴り', mma:'フライングニー', hero:'本気の一撃', wrestler:'パワーボム',
};
const SPECIAL_COUNTER_NAMES = {
  gi:'捌き投げ', soldier:'蹴り足キャッチスラム', mma:'膝返し投げ', hero:'本気返し', wrestler:'リバーサル',
};

function trySpecial(f){
  if (f.guard || f.state !== 'idle') return;
  if (f.specialGauge < SPECIAL_GAUGE_MAX) return;
  const now = performance.now();
  f.state = 'special';
  f.attackStart = now;
  f.specialStart = now;
  f.attackResolved = false;
  f.specialGauge = 0;
  updateGaugeUI();
}

function resolveSpecialHit(attacker){
  if (attacker.attackResolved) return;
  attacker.attackResolved = true;
  const defender = other(attacker);
  if (defender.state === 'down') return;

  const spec = SPECIAL_SPECS[attacker.costume];
  const dx = Math.abs(attacker.mesh.position.x - defender.mesh.position.x);
  const dz = Math.abs(attacker.mesh.position.z - defender.mesh.position.z);

  if (spec.isGrab){
    // wrestler's powerbomb — guaranteed (ignores guard, like every other throw in this game),
    // but only if still in range once the windup finishes; whiffing just eases back to idle
    // through the same recovery envelope the strikes use, no separate pose needed for it.
    const canGrab = dx <= spec.reach && dz <= 0.85 &&
      defender.state !== 'thrown' && defender.state !== 'thrownDown' && defender.state !== 'knockdown';
    if (!canGrab){
      flashCenterText('MISS', '', 500);
      SFX.miss();
      return;
    }
    doThrow(attacker, defender, 'powerbomb_special', spec.dmg);
    return;
  }

  if (dx > spec.reach || dz > 0.75 || defender.state === 'thrown' || defender.state === 'thrownDown' || defender.state === 'knockdown'){
    flashCenterText('MISS', '', 500);
    SFX.miss();
    return;
  }

  let dmg = spec.dmg;
  if (defender.guard){
    dmg *= 0.3;
    shake(0.06, 120);
    SFX.guard();
    spawnHitPopup(defender, 'GUARD', '#4da6ff');
  } else {
    shake(0.18, 260);
    SFX.heavyHit();
    showSpecialHitEffect(SPECIAL_MOVE_NAMES[attacker.costume]);
    spawnHitPopup(defender, 'HIT!', '#ff5e3a');
    if (spec.knockdown){
      defender.state = 'knockdown';
      defender.knockdownStart = now2();
    } else {
      defender.state = 'hitstun';
      defender.hitstunUntil = now2() + 300;
    }
  }
  gainSpecialGauge(attacker, defender, dmg);
  flashHit(defender);
  applyDamage(defender, dmg, 'special');
}

/* =========================================================
   Combat: throws / counters
   ========================================================= */
// Countering an opponent's charged special punishes it harder than any normal-attack counter —
// it cost them their whole gauge, so getting reversed should sting more than a regular whiff.
const SPECIAL_COUNTERS = {
  gi:       { kind:'counter_gi',       dmg:30 },
  soldier:  { kind:'counter_soldier',  dmg:30 },
  mma:      { kind:'counter_mma',      dmg:32 },
  hero:     { kind:'counter_hero',     dmg:38 },
  wrestler: { kind:'counter_wrestler', dmg:34 },
};

function tryThrow(f){
  if (f.state !== 'idle') return;
  const o = other(f);
  const now = performance.now();
  const dx = Math.abs(f.mesh.position.x - o.mesh.position.x);
  const dz = Math.abs(f.mesh.position.z - o.mesh.position.z);

  // Every special move (all 5 now share the 'special' state + specialStart timing) can be
  // caught mid-windup — 900ms comfortably covers the longest startup (hero's 700ms) while
  // still relying on !o.attackResolved as the real gate, same as the normal-attack counter below.
  const specialCounterActive = o.state === 'special' && !o.attackResolved && (now - o.specialStart) <= 900;
  if (specialCounterActive && dx <= 1.9 && dz <= 0.9){
    const c = SPECIAL_COUNTERS[o.costume];
    o.mesh.rotation.x = 0; // in case o was mid-backflip (soldier) — avoid a pop into the throw's own arc
    doThrow(f, o, c.kind, c.dmg); // sets o.state='thrown' — must NOT be overwritten below
    o.attackResolved = true; // the reversed special is fully negated, no separate resolution fires
    o.specialGauge = 0; // …and the gauge it cost them is gone for good, no partial refund
    updateGaugeUI();
    return;
  }

  const counterActive = o.state === 'attack' && !o.attackResolved && (now - o.lastAttack.time) <= 500;

  if (counterActive && dx <= 1.9 && dz <= 0.9){
    const stage = o.lastAttack.stage || 1;
    let kind, dmg;
    if (o.lastAttack.type === 'punch'){
      if (stage === 1){
        const throwsUp = f.mesh.position.x < 0; // screen-left => up, screen-right => down
        kind = throwsUp ? 'aikido_up' : 'aikido_down'; dmg = 18;
      } else if (stage === 2){ kind = 'koshi_nage'; dmg = 20; }        // vs the one-two's straight
      else { kind = 'ura_nage'; dmg = 24; }                            // vs the uppercut
    } else {
      if (stage === 1){ kind = 'dragon_screw'; dmg = 20; }
      else if (stage === 2){ kind = 'duck_tackle'; dmg = 20; }         // duck under the head kick, tackle
      else { kind = 'achilles_lock'; dmg = 26; }                       // catch the sobat, reverse achilles lock
    }
    doThrow(f, o, kind, dmg); // sets o.state='thrown' — must NOT be overwritten below
    o.attackResolved = true; // counter negates the attack, no separate resolution fires
    o.comboStage = 0; o.queuedAction = null;
    return;
  }

  if (dx <= 1.05 && dz <= 0.7 && o.state === 'idle'){
    doThrow(f, o, 'maki_nage', 15);
    return;
  }

  // whiff
  f.state = 'throwWhiff';
  f.attackStart = now;
  flashCenterText('MISS', '', 400);
  SFX.miss();
}

const THROW_DURATIONS = {
  maki_nage:750, aikido_up:850, aikido_down:850, dragon_screw:850,
  koshi_nage:800, ura_nage:950, duck_tackle:900, achilles_lock:1050,
  powerbomb_special:1000,
  counter_gi:800, counter_soldier:850, counter_mma:950, counter_hero:1050, counter_wrestler:1000,
};
const BIG_SHAKE_THROWS = new Set([
  'ura_nage', 'achilles_lock', 'powerbomb_special',
  'counter_gi', 'counter_soldier', 'counter_mma', 'counter_hero', 'counter_wrestler',
]);

function doThrow(thrower, target, kind, dmg){
  const now = performance.now();
  thrower.state = 'throw'; target.state = 'thrown';
  const data = { kind, start:now, duration: THROW_DURATIONS[kind] || 850,
                 throwerX:thrower.mesh.position.x, throwerZ:thrower.mesh.position.z,
                 targetX0:target.mesh.position.x, targetZ0:target.mesh.position.z,
                 dmg, applied:false };
  thrower.throwInfo = data; target.throwInfo = data;
  shake(BIG_SHAKE_THROWS.has(kind) ? 0.2 : 0.12, kind === 'achilles_lock' || kind === 'powerbomb_special' ? 280 : 200);
}

/* =========================================================
   Damage / KO / defeat pose
   ========================================================= */
function applyDamage(f, dmg, cause){
  f.hp = Math.max(0, f.hp - dmg);
  updateHpUI();
  updateGaugeUI();
  if (f.hp <= 0 && f.state !== 'down'){
    f.state = 'down';
    f.downType = (cause === 'throw') ? 'prone' : 'knees';
    matchState = 'roundEnd';
    SFX.ko();
    triggerHitStop(180);
    flashImpact('#ff3b3b', 260);
    flashImpactCallout('K.O.!', '#ff5e3a');
    shake(0.28, 420);
    // was 900ms — extended so the K.O. moment has room to breathe before the round-winner
    // announcement cuts in, instead of the two blurring together
    setTimeout(() => endRound(f === player ? cpu : player), 1500);
  }
}

/* =========================================================
   Pose / animation per-frame
   ========================================================= */
function resetPose(f){
  const L = f.mesh.userData.limbs;
  L.armL.shoulder.rotation.set(0,0,0); L.armL.elbow.rotation.set(0,0,0);
  L.armR.shoulder.rotation.set(0,0,0); L.armR.elbow.rotation.set(0,0,0);
  L.legL.hip.rotation.set(0,0,0); L.legL.knee.rotation.set(0,0,0);
  L.legR.hip.rotation.set(0,0,0); L.legR.knee.rotation.set(0,0,0);
  L.chest.rotation.set(0,0,0);
  L.hips.rotation.set(0,0,0);
  L.neck.rotation.set(0,0,0);
  f.mesh.position.y = 0;
  f.mesh.rotation.z = 0;
}

// -PI/2 swings the limb to exactly horizontal (perpendicular to gravity) at full extension.
// Punch goes further still (measured against the opponent's chest height from the crouched
// stance) so the fist lands at chest level instead of reading as a low body-shot.
const PUNCH_POSE = { shoulder:-(104 * Math.PI/180), elbow:0.05 };
const KICK_POSE  = { hip:-Math.PI/2, knee:0.05, hipYaw:0.6, waistYaw:0.35 };

function blendStance(f, rate){
  const L = f.mesh.userData.limbs;
  const lerp = THREE.MathUtils.lerp;
  const guardT = f.guard ? 1 : 0;
  L.chest.rotation.x = lerp(L.chest.rotation.x, STANCE.chestLeanX + guardT*0.05, rate);
  // guarding tucks the chin down behind the raised arms; otherwise the head rides level
  L.neck.rotation.x = lerp(L.neck.rotation.x, guardT * 0.3, rate);
  L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, rate);
  L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, rate);
  L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, rate);
  L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, rate);
  L.legL.hip.rotation.y = lerp(L.legL.hip.rotation.y, 0, rate);
  L.hips.rotation.y = lerp(L.hips.rotation.y, 0, rate);
  L.waist.rotation.y = lerp(L.waist.rotation.y, 0, rate);
  L.chest.rotation.y = lerp(L.chest.rotation.y, 0, rate);
  L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX + guardT*0.15, rate);
  L.armL.shoulder.rotation.z = lerp(L.armL.shoulder.rotation.z, STANCE.shoulderZ, rate);
  L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, rate);
  L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX + guardT*0.15, rate);
  L.armR.shoulder.rotation.z = lerp(L.armR.shoulder.rotation.z, -STANCE.shoulderZ, rate);
  L.armR.elbow.rotation.x = lerp(L.armR.elbow.rotation.x, STANCE.elbowX, rate);
  // subtle on-the-balls-of-the-feet bounce so the ready stance never looks frozen
  f.mesh.position.y = Math.sin(performance.now() * 0.0042 + f.bobPhase) * 0.02;
}

function animatePose(f){
  const L = f.mesh.userData.limbs;
  const now = performance.now();
  const lerp = THREE.MathUtils.lerp;

  // The neck continuously relaxes toward neutral every frame regardless of state; the
  // hitstun branch below overrides it with an explicit snapped-back target for its duration,
  // which naturally recovers once hitstun ends — no need to reset it in every state branch.
  L.neck.rotation.x = lerp(L.neck.rotation.x, 0, 0.15);
  L.neck.rotation.y = lerp(L.neck.rotation.y, 0, 0.15);

  if (f.state === 'victory'){
    // arms punch up overhead (continuing the same swing direction PUNCH_POSE already uses to
    // bring the rear arm to horizontal-front, carried on further to fully overhead) and the
    // chest puffs out/leans back — held indefinitely until the next round/restart resets it.
    const el = THREE.MathUtils.clamp((now - f.victoryStart) / 500, 0, 1);
    L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, -(168 * Math.PI/180), el);
    L.armL.shoulder.rotation.z = lerp(L.armL.shoulder.rotation.z, 0.35, el);
    L.armL.elbow.rotation.x = lerp(STANCE.elbowX, 0.12, el);
    L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX, -(168 * Math.PI/180), el);
    L.armR.shoulder.rotation.z = lerp(L.armR.shoulder.rotation.z, -0.35, el);
    L.armR.elbow.rotation.x = lerp(STANCE.elbowX, 0.12, el);
    L.chest.rotation.x = lerp(STANCE.chestLeanX, -0.22, el);
    L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, -0.08, 0.15);
    L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, 0.12, 0.15);
    L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, -0.08, 0.15);
    L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, 0.12, 0.15);
    f.mesh.position.y = Math.sin(now * 0.0025) * 0.035; // slow triumphant bob
    return;
  }

  if (f.state === 'special'){
    const spec = SPECIAL_SPECS[f.costume];
    const total = spec.startup + spec.active + spec.recovery;
    const elapsed = now - f.specialStart;
    const t = THREE.MathUtils.clamp(elapsed / total, 0, 1);
    // Three-phase envelope shared by all four strike specials: chamber into a held telegraph
    // pose (0->1 over the first ~55% of startup, then holds), then a fast "strike" snap into
    // full extension timed to finish exactly as startup ends (when resolveSpecialHit fires),
    // then both eased back to neutral together during recovery.
    const chamberInEnd = spec.startup * 0.55, holdEnd = spec.startup * 0.85, activeEnd = spec.startup + spec.active;
    let chamber, strike;
    if (elapsed < chamberInEnd){ chamber = elapsed / chamberInEnd; strike = 0; }
    else if (elapsed < holdEnd){ chamber = 1; strike = 0; }
    else if (elapsed < spec.startup){ chamber = 1; strike = (elapsed - holdEnd) / (spec.startup - holdEnd); }
    else if (elapsed < activeEnd){ chamber = 1; strike = 1; }
    else { const r = (elapsed - activeEnd) / Math.max(1, total - activeEnd); chamber = 1 - r; strike = 1 - r; }
    chamber = THREE.MathUtils.clamp(chamber, 0, 1);
    strike = THREE.MathUtils.clamp(strike, 0, 1);

    if (f.costume === 'gi'){
      // low, wide chamber (fist pulled to the hip) then an explosive deep lunge punch
      L.legR.hip.rotation.x = lerp(STANCE.frontHipX, STANCE.frontHipX - 0.25, chamber);
      L.legR.knee.rotation.x = lerp(STANCE.frontKneeX, STANCE.frontKneeX + 0.25, chamber);
      L.legL.hip.rotation.x = lerp(STANCE.backHipX, STANCE.backHipX - 0.25, chamber);
      L.legL.knee.rotation.x = lerp(STANCE.backKneeX, STANCE.backKneeX + 0.25, chamber);
      L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.3, chamber);
      L.hips.rotation.y = lerp(0, 0.3, chamber); // winds up away from the punch during the chamber...
      L.chest.rotation.y = lerp(0, 0.22, chamber);
      L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX, STANCE.shoulderX + 0.5, chamber);
      L.armR.elbow.rotation.x = lerp(STANCE.elbowX, STANCE.elbowX - 0.7, chamber);
      L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, PUNCH_POSE.shoulder - 0.15, strike);
      L.armR.elbow.rotation.x = lerp(L.armR.elbow.rotation.x, PUNCH_POSE.elbow, strike);
      L.chest.rotation.x = lerp(L.chest.rotation.x, STANCE.chestLeanX + 0.25, strike);
      L.hips.rotation.y = lerp(L.hips.rotation.y, -0.25, strike); // ...then unwinds hard the other way as the fist lands
      L.chest.rotation.y = lerp(L.chest.rotation.y, -0.2, strike);
      L.neck.rotation.y = lerp(0, 0.15, strike);
      L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
      L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, 0.2);
    } else if (f.costume === 'hero'){
      // raises the fist overhead exactly like the victory pose's proven "arms up" values
      // (same shoulder.x/z/elbow numbers) and holds there charging, then slams down-forward
      L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX, -(168 * Math.PI/180), chamber);
      L.armR.shoulder.rotation.z = lerp(STANCE.shoulderZ, -0.35, chamber);
      L.armR.elbow.rotation.x = lerp(STANCE.elbowX, 0.12, chamber);
      L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.35, chamber);
      L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, STANCE.shoulderX + 0.35, chamber); // off-arm forward for balance/silhouette
      L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, PUNCH_POSE.shoulder - 0.3, strike);
      L.armR.shoulder.rotation.z = lerp(L.armR.shoulder.rotation.z, 0, strike);
      L.armR.elbow.rotation.x = lerp(L.armR.elbow.rotation.x, PUNCH_POSE.elbow, strike);
      L.chest.rotation.x = lerp(L.chest.rotation.x, STANCE.chestLeanX + 0.3, strike);
      L.chest.rotation.y = lerp(0, -0.18, strike); // torso rotates into the downward slam
      L.hips.rotation.y = lerp(0, -0.2, strike);
      L.neck.rotation.x = lerp(0, 0.15, strike); // head drives down with the swing
      L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
      L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, 0.2);
      L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
      L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
    } else if (f.costume === 'soldier'){
      // true backflip (somersault kick): the whole body rotates one continuous turn about the
      // pitch axis — root mesh.rotation.x, not just a limb — driven directly by t (the whole
      // special's 0-1 progress), NOT the chamber/strike envelope, since that eases back down
      // toward 0 during recovery and would spin the flip backward/give the jump a second bump.
      // faceOpponent() is skipped for 'special' precisely so this root rotation isn't wiped
      // out every frame by mesh.lookAt().
      f.mesh.position.y = Math.sin(Math.PI * t) * 0.6;
      f.mesh.rotation.x = -Math.PI * 2 * t;
      L.legL.hip.rotation.x = lerp(STANCE.backHipX, -1.6, chamber);
      L.legL.knee.rotation.x = lerp(STANCE.backKneeX, 1.4, chamber);
      L.legR.hip.rotation.x = lerp(STANCE.frontHipX, -0.7, chamber);
      L.legR.knee.rotation.x = lerp(STANCE.frontKneeX, 1.4, chamber);
      L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, KICK_POSE.hip - 0.3, strike);
      L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, KICK_POSE.knee, strike);
      L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX - 0.3, 0.2);
      L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX - 0.3, 0.2);
    } else if (f.costume === 'mma'){
      // both feet leave the ground as the front knee drives up and forward into the strike
      const jumpArc = Math.sin(Math.PI * THREE.MathUtils.clamp(chamber*0.5 + strike*0.5, 0, 1));
      f.mesh.position.y = jumpArc * 0.4;
      L.legR.hip.rotation.x = lerp(STANCE.frontHipX, -1.3, chamber);
      L.legR.knee.rotation.x = lerp(STANCE.frontKneeX, 2.0, chamber);
      L.legL.hip.rotation.x = lerp(STANCE.backHipX, -0.3, chamber);
      L.legL.knee.rotation.x = lerp(STANCE.backKneeX, 1.2, chamber);
      L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX + 0.15, chamber);
      L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, -1.7, strike);
      L.chest.rotation.x = lerp(L.chest.rotation.x, STANCE.chestLeanX + 0.3, strike);
      L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX - 0.4, 0.2);
      L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX - 0.4, 0.2);
    } else if (f.costume === 'wrestler'){
      // reaches forward into a wide grappling stance, ready to seize the opponent — holds
      // through the whole windup since the grab itself executes instantly at resolution
      // (transitioning to the 'throw' state, handled entirely by animateThrow from there)
      L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, -(100 * Math.PI/180), chamber);
      L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX, -(100 * Math.PI/180), chamber);
      L.armL.elbow.rotation.x = lerp(STANCE.elbowX, 0.1, chamber);
      L.armR.elbow.rotation.x = lerp(STANCE.elbowX, 0.1, chamber);
      L.legR.hip.rotation.x = lerp(STANCE.frontHipX, STANCE.frontHipX - 0.15, chamber);
      L.legL.hip.rotation.x = lerp(STANCE.backHipX, STANCE.backHipX - 0.15, chamber);
      L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX + 0.15, chamber);
    }
    if (t >= 1){ f.state = 'idle'; f.mesh.position.y = 0; f.mesh.rotation.x = 0; }
    return;
  }

  if (f.state === 'attack'){
    const spec = getAttackSpec(f.attackType, f.comboStage);
    const total = spec.startup + spec.active + spec.recovery;
    const t = THREE.MathUtils.clamp((now - f.attackStart) / total, 0, 1);
    const upT = spec.startup/total, activeEndT = (spec.startup+spec.active)/total;
    let swing;
    if (t < upT) swing = t/upT;
    else if (t < activeEndT) swing = 1;
    else swing = 1 - (t-activeEndT)/(1-activeEndT);

    if (f.attackType === 'kick'){
      if (f.comboStage === 3){
        // rolling sobat — a full 360° spin of the torso (hips+waist+chest, arms/head ride
        // along as children of chest), landing the kick back at chest height like the
        // stage-1 roundhouse rather than chambering higher like the stage-2 head kick.
        L.hips.rotation.y = lerp(0, Math.PI*2, swing);
        L.waist.rotation.y = lerp(0, Math.PI*2, swing);
        L.chest.rotation.y = lerp(0, Math.PI*2, swing);
        L.legL.hip.rotation.x = lerp(STANCE.backHipX, KICK_POSE.hip, swing);
        L.legL.knee.rotation.x = lerp(STANCE.backKneeX, KICK_POSE.knee, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.15, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX - 0.2, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX - 0.2, 0.2);
      } else if (f.comboStage === 2){
        // head kick — same roundhouse mechanics as stage 1 but chambers much higher so the
        // foot rises past chest height up toward the opponent's face.
        L.legL.hip.rotation.x = lerp(STANCE.backHipX, KICK_POSE.hip - 0.8, swing);
        L.legL.knee.rotation.x = lerp(STANCE.backKneeX, KICK_POSE.knee, swing);
        L.legL.hip.rotation.y = lerp(0, KICK_POSE.hipYaw + 0.25, swing);
        L.hips.rotation.y = lerp(0, KICK_POSE.waistYaw + 0.15, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.4, swing);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX, 0.2);
      } else {
        // rear leg (legL, structurally back) chambers at the hip and snaps the knee straight,
        // with the hip and waist yawing into it so it arcs around like a roundhouse instead
        // of just swinging straight up, letting it reach the opponent's upper body.
        L.legL.hip.rotation.x = lerp(STANCE.backHipX, KICK_POSE.hip, swing);
        L.legL.knee.rotation.x = lerp(STANCE.backKneeX, KICK_POSE.knee, swing);
        L.legL.hip.rotation.y = lerp(0, KICK_POSE.hipYaw, swing);
        L.hips.rotation.y = lerp(0, KICK_POSE.waistYaw, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.15, swing);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX, 0.2);
      }
    } else {
      if (f.comboStage === 3){
        // uppercut — rear arm drives up from a low chamber instead of straight out; the hips/
        // chest twist into the punch (opposite sign from the cross below, since armR mirrors
        // armL) for a driving hip-shoulder rotation instead of an arm-only strike
        L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX + 0.3, PUNCH_POSE.shoulder - 0.5, swing);
        L.armR.shoulder.rotation.z = lerp(STANCE.shoulderZ, -STANCE.shoulderZ - 0.35, swing);
        L.armR.elbow.rotation.x = lerp(STANCE.elbowX + 0.6, PUNCH_POSE.elbow, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX - 0.1, STANCE.chestLeanX + 0.22, swing);
        L.hips.rotation.y = lerp(0, 0.22, swing);
        L.chest.rotation.y = lerp(0, 0.16, swing);
        L.neck.rotation.y = lerp(0, -0.12, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
        L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, 0.2);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, 0.2);
      } else if (f.comboStage === 2){
        // cross — the lead arm (armL) snaps out so it reads as a distinct second hit from the jab
        L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, PUNCH_POSE.shoulder, swing);
        L.armL.elbow.rotation.x = lerp(STANCE.elbowX, PUNCH_POSE.elbow, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX + 0.1, swing);
        L.hips.rotation.y = lerp(0, -0.2, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
        L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, 0.2);
        L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armR.elbow.rotation.x = lerp(L.armR.elbow.rotation.x, STANCE.elbowX, 0.2);
      } else {
        // rear arm (armR) drives the elbow straight for a cross/jab — a lighter torso twist
        // than the uppercut's, quick and sharp rather than a full wind-up
        L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX, PUNCH_POSE.shoulder, swing);
        L.armR.elbow.rotation.x = lerp(STANCE.elbowX, PUNCH_POSE.elbow, swing);
        L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX + 0.08, swing);
        L.hips.rotation.y = lerp(0, 0.14, swing);
        L.chest.rotation.y = lerp(0, 0.1, swing);
        L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
        L.legR.knee.rotation.x = lerp(L.legR.knee.rotation.x, STANCE.frontKneeX, 0.2);
        L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
        L.legL.knee.rotation.x = lerp(L.legL.knee.rotation.x, STANCE.backKneeX, 0.2);
        L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX, 0.2);
        L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, STANCE.elbowX, 0.2);
      }
    }
    if (t >= 1){
      if (f.queuedAction && f.comboStage < 3){
        const nextType = f.queuedAction;
        const nextStage = (f.attackType === nextType) ? f.comboStage + 1 : 1;
        startAttackStage(f, nextType, nextStage, now);
      } else {
        // NOTE: comboStage is intentionally left as-is (not zeroed) here — tryAttack()
        // reads it to decide whether the next press continues the string, using
        // comboExpireAt (a real deadline) rather than this flag to know when it's stale.
        f.state = 'idle';
      }
    }
    return;
  }

  if (f.state === 'throwWhiff'){
    L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, -0.9, 0.3);
    L.armL.elbow.rotation.x = lerp(L.armL.elbow.rotation.x, 0.2, 0.3);
    if (now - f.attackStart > 350) f.state = 'idle';
    return;
  }

  if (f.state === 'throw' || f.state === 'thrown'){
    animateThrow(f);
    return;
  }

  if (f.state === 'thrownDown'){
    // stay down for a beat after landing so a throw clearly reads as a throw,
    // instead of popping back upright immediately.
    const THROWN_DOWN_MS = 700, GET_UP_MS = 220;
    const elapsed = now - f.thrownDownStart;
    const downT = THREE.MathUtils.clamp(elapsed / 130, 0, 1);
    const upT = THREE.MathUtils.clamp((elapsed - (THROWN_DOWN_MS - GET_UP_MS)) / GET_UP_MS, 0, 1);
    const lieAmount = downT * (1 - upT);
    f.mesh.rotation.x = lerp(0, Math.PI/2*0.85, lieAmount);
    f.mesh.position.y = lerp(0, 0.16, lieAmount);
    if (elapsed >= THROWN_DOWN_MS){
      f.mesh.rotation.set(0,0,0);
      f.mesh.position.y = 0;
      f.state = 'idle';
    }
    return;
  }

  if (f.state === 'knockdown'){
    // a clean uppercut knocks the opponent onto their back — distinct from being thrown
    // (falls backward, not forward-prone) and from a KO (gets back up after a beat).
    const KNOCKDOWN_MS = 900, GET_UP_MS = 260;
    const elapsed = now - f.knockdownStart;
    const downT = THREE.MathUtils.clamp(elapsed / 150, 0, 1);
    const upT = THREE.MathUtils.clamp((elapsed - (KNOCKDOWN_MS - GET_UP_MS)) / GET_UP_MS, 0, 1);
    const lieAmount = downT * (1 - upT);
    f.mesh.rotation.x = lerp(0, -Math.PI/2*0.8, lieAmount);
    f.mesh.position.y = lerp(0, 0.14, lieAmount);
    if (elapsed >= KNOCKDOWN_MS){
      f.mesh.rotation.set(0,0,0);
      f.mesh.position.y = 0;
      f.state = 'idle';
    }
    return;
  }

  if (f.state === 'hitstun'){
    L.chest.rotation.x = lerp(L.chest.rotation.x, STANCE.chestLeanX + 0.35, 0.3);
    // head snaps sharply back on impact — the single biggest readability cue that a hit
    // actually landed, since it overrides the neck's continuous relax-to-neutral above
    L.neck.rotation.x = lerp(L.neck.rotation.x, -0.6, 0.5);
    L.armL.shoulder.rotation.x = lerp(L.armL.shoulder.rotation.x, STANCE.shoulderX - 0.5, 0.3);
    L.armR.shoulder.rotation.x = lerp(L.armR.shoulder.rotation.x, STANCE.shoulderX - 0.5, 0.3);
    L.legR.hip.rotation.x = lerp(L.legR.hip.rotation.x, STANCE.frontHipX, 0.2);
    L.legL.hip.rotation.x = lerp(L.legL.hip.rotation.x, STANCE.backHipX, 0.2);
    if (now > f.hitstunUntil) f.state = 'idle';
    return;
  }

  if (f.state === 'down'){
    const el = THREE.MathUtils.clamp((now - (f.downStart || (f.downStart = now))) / 500, 0, 1);
    if (f.downType === 'prone'){
      f.mesh.rotation.x = lerp(0, Math.PI/2*0.92, el);
      f.mesh.position.y = lerp(0, 0.18, el);
    } else {
      L.legR.hip.rotation.x = lerp(STANCE.frontHipX, -1.3, el);
      L.legR.knee.rotation.x = lerp(STANCE.frontKneeX, 1.7, el);
      L.legL.hip.rotation.x = lerp(STANCE.backHipX, -1.3, el);
      L.legL.knee.rotation.x = lerp(STANCE.backKneeX, 1.7, el);
      L.chest.rotation.x = lerp(STANCE.chestLeanX, 0.6, el);
      f.mesh.position.y = lerp(0, -0.42, el);
    }
    return;
  }

  // idle / guard / walking — hold the fighting stance
  blendStance(f, 0.2);
}

function animateThrow(f){
  const data = f.throwInfo;
  if (!data) return;
  const now = performance.now();
  const t = THREE.MathUtils.clamp((now - data.start) / data.duration, 0, 1);
  const lerp = THREE.MathUtils.lerp;
  const isThrower = f.state === 'throw';
  const target = isThrower ? null : f;

  if (!isThrower){
    let toX = data.targetX0, toZ = data.targetZ0;
    if (data.kind === 'maki_nage'){
      // 巻き投げ — dives in, wraps the arm/neck, and rolls them along in a forward tumble;
      // the whole point is rolling DOWN TOGETHER, so the target lands close to the thrower
      // rather than being flung far away like a shoulder throw would.
      const dir = data.targetX0 >= data.throwerX ? -1 : 1;
      toX = data.throwerX + dir * 0.8;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = Math.PI * 2 * t;
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.0;
    } else if (data.kind === 'aikido_up' || data.kind === 'aikido_down'){
      // redirect the punch's own momentum and throw them up and over — rotation.x (pitch,
      // tumbling front-to-back) reads clearly from the side camera; the old rotation.z (roll)
      // just looked like the target flopping flat on the ground immediately.
      const dirZ = data.kind === 'aikido_up' ? -1 : 1;
      toZ = THREE.MathUtils.clamp(data.targetZ0 + dirZ*1.6, -ARENA_Z, ARENA_Z);
      f.mesh.position.x = lerp(data.targetX0, data.throwerX + (data.targetX0<data.throwerX?-0.6:0.6), t);
      f.mesh.position.z = lerp(data.targetZ0, toZ, t);
      f.mesh.rotation.x = Math.PI * 2 * t;
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.3;
    } else if (data.kind === 'dragon_screw'){
      // catches the leg at the ankle and spins their OWN body in place, wringing the caught
      // leg like a cloth — a joint-twisting takedown, not an aerial launch, so it stays low
      // and close rather than carrying them far or high
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 0.7;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.rotation.y = lerp(0, Math.PI*2, t); // capped at one full turn — was 3π (1.5 turns), over-spun
      f.mesh.position.y = Math.sin(Math.PI*t) * 0.7;
    } else if (data.kind === 'koshi_nage'){
      // real hip throw: pulled onto the thrower's hip (mounted, feet off the ground), flipped
      // forward over it, and slammed onto the back close to where they started — a hip throw
      // pivots almost in place, it doesn't carry the target far or to the side.
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 0.5;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = Math.PI * 2 * t;
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.0;
    } else if (data.kind === 'ura_nage'){
      // back suplex — countering the uppercut: the biggest arc, thrower falls backward
      // carrying the target up and over, landing furthest behind the thrower of any throw
      const dir = data.targetX0 >= data.throwerX ? -1 : 1;
      toX = data.throwerX + dir * 1.8;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = lerp(0, -Math.PI*2, t);
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.6;
    } else if (data.kind === 'duck_tackle'){
      // legs wrapped and swept out from under them by the driving tackle — the whole body
      // topples BACKWARD (legs taken away, falls onto their buttocks), not forward
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 1.3;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = lerp(0, -Math.PI * 0.6, t);
      f.mesh.position.y = Math.max(0, Math.sin(Math.PI*t) * 0.35);
    } else if (data.kind === 'achilles_lock'){
      // caught the kicking leg and quickly pulled them down flat on their back (first ~28%
      // of the duration), then held there — a real submission hold, not an aerial throw —
      // with a small pained writhe/twitch for the rest (this throw's duration is the longest
      // of all of them specifically so this "held and reacting" phase has room to read)
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 0.7;
      const dropT = THREE.MathUtils.clamp(t / 0.28, 0, 1);
      f.mesh.position.x = lerp(data.targetX0, toX, dropT);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, dropT);
      f.mesh.rotation.x = lerp(0, -Math.PI * 0.5, dropT);
      const writhe = t > 0.28 ? Math.sin((t - 0.28) * 26) * 0.05 : 0;
      f.mesh.position.y = Math.sin(Math.PI * dropT) * 0.3 + writhe;
    } else if (data.kind === 'powerbomb_special'){ // the wrestler's ultimate: hoisted straight
      // up above the thrower's head — fully inverted right at the peak of the arc (rotation
      // hits exactly π when the sin-based height curve peaks at t=0.5) — then driven straight
      // back down onto their back. Minimal horizontal travel so it reads as raw power, not distance.
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 0.4;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = Math.PI * 2 * t;
      f.mesh.position.y = Math.sin(Math.PI*t) * 2.3;
    } else if (data.kind === 'counter_gi'){
      // redirects the chambered straight punch's own momentum — quick, tight throw to the side.
      // rotation.x (pitch), not .z (roll) — matches the aikido/koshi_nage fix.
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 1.2;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = Math.PI * 2 * t;
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.1;
    } else if (data.kind === 'counter_soldier'){
      // catches the descending heel-drop kick and slams them down low
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 0.8;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = lerp(0, Math.PI*1.3, t);
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.0;
    } else if (data.kind === 'counter_mma'){
      // catches the airborne flying knee, spins them around mid-air and slams
      const dir = data.targetX0 >= data.throwerX ? -1 : 1;
      toX = data.throwerX + dir * 1.3;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.y = lerp(0, Math.PI*2, t); // capped at one full turn — was 2.5π (1.25 turns), over-spun
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.5;
    } else if (data.kind === 'counter_hero'){
      // the biggest, most decisive reversal — punishing the most telegraphed special of all
      // with the highest arc and longest carry of any counter
      const dir = data.targetX0 >= data.throwerX ? -1 : 1;
      toX = data.throwerX + dir * 1.9;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = lerp(0, -Math.PI*2, t); // capped at one full turn — was 2.2π (1.1 turns), over-spun; the height/carry distance already set below make this read as the biggest throw without an extra partial spin
      f.mesh.position.y = Math.sin(Math.PI*t) * 1.8;
    } else { // counter_wrestler — turns the powerbomb attempt back onto the wrestler themselves,
      // deliberately mirroring powerbomb_special's own lift/inversion/slam so it reads as
      // poetic justice
      const dir = data.targetX0 >= data.throwerX ? 1 : -1;
      toX = data.throwerX + dir * 0.4;
      f.mesh.position.x = lerp(data.targetX0, toX, t);
      f.mesh.position.z = lerp(data.targetZ0, data.throwerZ, t);
      f.mesh.rotation.x = Math.PI * 2 * t;
      f.mesh.position.y = Math.sin(Math.PI*t) * 2.3;
    }
    if (t >= 1){
      f.mesh.position.y = 0;
      f.mesh.rotation.set(0,0,0);
      f.throwInfo = null;
      if (!data.applied){
        data.applied = true;
        SFX.throwHit();
        gainSpecialGauge(other(f), f, data.dmg);
        applyDamage(f, data.dmg, 'throw'); // may set f.state = 'down' if this KOs
        if (data.kind === 'powerbomb_special') showSpecialHitEffect(SPECIAL_MOVE_NAMES.wrestler);
        else if (data.kind.startsWith('counter_')) showSpecialHitEffect(SPECIAL_COUNTER_NAMES[data.kind.slice(8)]);
        spawnHitPopup(f, 'HIT!', '#ff5e3a');
      }
      if (f.state !== 'down'){
        f.state = 'thrownDown';
        f.thrownDownStart = now;
      }
    }
  } else {
    const L = f.mesh.userData.limbs;
    if (data.kind === 'powerbomb_special' || data.kind === 'counter_wrestler'){
      // both arms raise together, as if hoisting the opponent straight up overhead
      const liftT = Math.sin(Math.PI * t);
      L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, -(160 * Math.PI/180), liftT);
      L.armR.shoulder.rotation.x = lerp(STANCE.shoulderX, -(160 * Math.PI/180), liftT);
      L.armL.elbow.rotation.x = lerp(STANCE.elbowX, 0.1, liftT);
      L.armR.elbow.rotation.x = lerp(STANCE.elbowX, 0.1, liftT);
      L.chest.rotation.x = lerp(STANCE.chestLeanX, STANCE.chestLeanX - 0.2, liftT);
    } else {
      L.armL.shoulder.rotation.x = lerp(STANCE.shoulderX, -1.5, Math.sin(Math.PI*t));
      L.armL.elbow.rotation.x = lerp(STANCE.elbowX, 0.15, Math.sin(Math.PI*t));
    }
    if (t >= 1){ f.state = 'idle'; f.throwInfo = null; }
  }
}

/* =========================================================
   FX helpers
   ========================================================= */
function flashHit(f){
  f.flashUntil = performance.now() + 140;
  if (Net.isHost) netSend({ t:'ev', name:'flashHit', who: f === player ? 'p' : 'c' });
}
function updateFlash(f){
  const L = f.mesh.userData.limbs;
  const on = performance.now() < f.flashUntil;
  L.hitMeshes.forEach(m => {
    m.material.emissive = m.material.emissive || new THREE.Color(0);
    m.material.emissive.setHex(on ? 0xffffff : 0x000000);
    m.material.emissiveIntensity = on ? 0.8 : 0;
  });
}

const comboCounterEl = document.getElementById('comboCounter');
let comboCounterTimer = null;
function showComboCounter(n){
  clearTimeout(comboCounterTimer);
  comboCounterEl.textContent = n + ' HIT COMBO!';
  comboCounterEl.classList.remove('show'); void comboCounterEl.offsetWidth; comboCounterEl.classList.add('show');
  comboCounterTimer = setTimeout(() => comboCounterEl.classList.remove('show'), 900);
  if (Net.isHost) netSend({ t:'ev', name:'combo', n });
}

const centerText = document.getElementById('centerText');
let centerTimer = null;
function flashCenterText(big, small, ms, skipBroadcast){
  clearTimeout(centerTimer);
  centerText.querySelector('.big').textContent = big;
  centerText.querySelector('.small').textContent = small;
  centerText.classList.remove('show'); void centerText.offsetWidth; centerText.classList.add('show');
  centerText.querySelector('.big').style.opacity = 1;
  centerTimer = setTimeout(() => { centerText.querySelector('.big').style.opacity = 0; }, ms);
  // skipBroadcast: used for perspective-specific text (round/match win-lose) — the host's own
  // wording ("YOU WIN") would be wrong if relayed verbatim to the guest, who lost. Those callers
  // broadcast a neutral fact instead and let each client render its own perspective-correct text.
  if (Net.isHost && !skipBroadcast) netSend({ t:'ev', name:'centerText', big, small, ms });
}

// Perspective-aware win/lose phrasing. winnerIsPlayerObj is an OBJECTIVE fact (did the `player`
// object — which is always the host's fighter — win), independent of who's looking at the screen;
// each client (host/guest/spectator) turns that fact into wording that makes sense from where
// THEY sit, since a guest seeing "YOU WIN" when the host actually won would be actively wrong.
function describeOutcome(winnerIsPlayerObj, isMatchEnd){
  const scope = isMatchEnd ? 'THE MATCH' : 'ROUND';
  if (Net.isSpectator) return (winnerIsPlayerObj ? 'P1' : 'P2') + ' WINS ' + scope;
  const iWon = Net.isGuest ? !winnerIsPlayerObj : winnerIsPlayerObj;
  if (iWon) return 'YOU WIN ' + scope + (isMatchEnd ? '!' : '');
  if (Net.isOnline) return 'YOU LOSE ' + scope;
  return 'CPU WINS ' + scope; // offline vs CPU — unchanged framing
}

/* =========================================================
   Danmaku — niconico-style scrolling chat, driven by spectator
   comments relayed through the host. Rendered identically for
   everyone (host, player2, all spectators) via the 'chat' ev.

let danmakuLaneIdx = 0;
function addDanmaku(text){

  const lane = danmakuLaneIdx % DANMAKU_LANES;

// Untrusted text from the network (anyone with the 6-digit room code can join as a
// spectator) — strip newlines/control chars and hard-cap length before it's ever displayed.
function sanitizeChatText(text){
  if (typeof text !== 'string') return '';
  return text.replace(/[\r\n\t]+/g, ' ').trim().slice(0, 30);
}

/* =========================================================
   Round / match flow
   ========================================================= */
let matchState = 'intro'; // intro | countdown | fighting | roundEnd | matchEnd
let roundNumber = 1;
const WINS_NEEDED = 2;

function resetFighter(f, x){
  f.hp = 100; f.state = 'idle'; f.guard = false; f.posTween = null; f.throwInfo = null;
  f.attackResolved = true; f.downType = null; f.downStart = null;
  f.comboStage = 0; f.comboExpireAt = 0; f.queuedAction = null; f.comboDecided = true;
  f.confirmedCombo = 0; f.knockdownStart = 0; f.victoryStart = 0;
  f.specialGauge = 0; f.specialStart = 0;
  f.lastAttack = { type:null, stage:0, time:-9999 };
  f.mesh.position.set(x, 0, 0);
  resetPose(f);
  updateFlash(f);
}

function startRound(){
  resetFighter(player, -1.6);
  resetFighter(cpu, 1.6);
  updateHpUI();
  updateGaugeUI();
  matchState = 'countdown';
  flashCenterText('ROUND ' + roundNumber, '', 900);
  setTimeout(() => {
    flashCenterText('FIGHT!', '', 700);
    matchState = 'fighting';
    SFX.bell();
  }, 1000);
}

function endRound(winner){
  winner.wins++;
  updatePipsUI();
  const winnerIsPlayerObj = (winner === player); // objective fact — `player` is always the host's fighter
  if (winner.wins >= WINS_NEEDED){
    matchState = 'matchEnd';
    flashCenterText(describeOutcome(winnerIsPlayerObj, true), 'MATCH OVER', 3000, true);
    if (Net.isHost) netSend({ t:'ev', name:'matchOutcome', winnerIsPlayerObj, isMatchEnd:true });
    SFX.win();
    winner.state = 'victory';
    winner.victoryStart = performance.now();
    setTimeout(() => showFinalOverlay(winnerIsPlayerObj), 1600);
  } else {
    // names the round explicitly ("ROUND 1  YOU WIN") so it's never ambiguous which round
    // just ended or who took it — describeOutcome() alone didn't say which round
    const roundResultText = 'ROUND ' + roundNumber + '  ' + describeOutcome(winnerIsPlayerObj, false).replace(' ROUND', '');
    flashCenterText(roundResultText, 'WINNER', 1800, true);
    if (Net.isHost) netSend({ t:'ev', name:'matchOutcome', winnerIsPlayerObj, isMatchEnd:false });
    roundNumber++;
    // was 1800ms total — stretched out (and with a deliberate quiet beat before the next
    // "ROUND N" banner) so the two moments read as distinct instead of blurring together
    setTimeout(startRound, 2600);
  }
}

function showFinalOverlay(winnerIsPlayerObj){
  if (winnerIsPlayerObj === undefined) winnerIsPlayerObj = player.wins > cpu.wins; // offline fallback
  const iWon = Net.isGuest ? !winnerIsPlayerObj : winnerIsPlayerObj;
  const showWinTreatment = !Net.isSpectator && iWon; // spectators get the neutral/subdued look either way
  document.getElementById('overlayTitle').textContent = describeOutcome(winnerIsPlayerObj, true);
  const myWins = Net.isGuest ? cpu.wins : player.wins;
  const oppWins = Net.isGuest ? player.wins : cpu.wins;
  document.getElementById('overlayScore').textContent = Net.isSpectator
    ? (player.wins + ' - ' + cpu.wins) : (myWins + ' - ' + oppWins);
  const ov = document.getElementById('overlay');
  const canRestart = !Net.isOnline || Net.isHost; // only the host is authoritative enough to restart
  document.getElementById('overlaySub').textContent = canRestart ? 'タップしてもう一度' : 'ホストの操作をお待ちください…';
  document.getElementById('overlayBtn').style.display = canRestart ? '' : 'none';

}
